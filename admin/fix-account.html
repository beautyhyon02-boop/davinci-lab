<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>계정 수정 – 내부 도구</title>
<base href="https://ueygjubz.gensparkspace.com/">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; padding: 24px; background: #f4f7f5; max-width: 700px; margin: 0 auto; }
  h2 { color: #163A33; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #e5e7eb; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
  button { padding: 10px 22px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 700; cursor: pointer; margin-right: 8px; }
  .btn-search { background: #163A33; color: #fff; }
  .btn-fix    { background: #4fc3a1; color: #111; }
  .btn-add    { background: #4f46e5; color: #fff; }
  .btn-del    { background: #ef4444; color: #fff; }
  #result { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e5e7eb;
    font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all;
    min-height: 80px; line-height: 1.7; }
  .ok   { color: #16a34a; font-weight: 700; }
  .warn { color: #d97706; font-weight: 700; }
  .err  { color: #dc2626; font-weight: 700; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
</style>
</head>
<body>
<h2>🔧 학생 계정 조회 · 수정 도구</h2>
<p class="sub">⚠️ 내부 관리용. 배포 후 admin 계정으로만 접근하세요.</p>

<!-- 검색 -->
<div class="card">
  <label>아이디로 검색 (student_id)</label>
  <input type="text" id="searchId" placeholder="예: seeyou" value="seeyou" />
  <button class="btn-search" onclick="searchAccount()">🔍 검색</button>
  <button class="btn-search" onclick="listAll()" style="background:#475569;">전체 목록</button>
</div>

<!-- 수정 -->
<div class="card">
  <h3 style="margin:0 0 14px;font-size:15px;color:#163A33;">✏️ 비밀번호 직접 수정</h3>
  <label>record ID (검색 후 복사)</label>
  <input type="text" id="fixRecordId" placeholder="UUID (검색 결과의 id 값)" />
  <label>새 비밀번호</label>
  <input type="text" id="fixPw" placeholder="예: xhadoswp-77" value="xhadoswp-77" />
  <button class="btn-fix" onclick="fixPassword()">💾 비밀번호 수정</button>
  <button class="btn-del" onclick="deleteEmpty()">🗑️ 빈 행 삭제</button>
</div>

<!-- 신규 추가 -->
<div class="card">
  <h3 style="margin:0 0 14px;font-size:15px;color:#163A33;">➕ 계정 신규 추가</h3>
  <label>student_id (로그인 아이디)</label>
  <input type="text" id="newId" placeholder="예: seeyou" />
  <label>이름</label>
  <input type="text" id="newName" placeholder="예: 김서유" />
  <label>학교</label>
  <input type="text" id="newSchool" placeholder="예: ○○중학교" />
  <label>학년</label>
  <input type="text" id="newGrade" placeholder="예: 중3" />
  <label>단계</label>
  <select id="newStage">
    <option>1단계</option><option>2단계</option><option>3단계</option><option>4단계</option><option>5단계</option>
  </select>
  <label>비밀번호</label>
  <input type="text" id="newPw" placeholder="예: xhadoswp-77" value="xhadoswp-77" />
  <button class="btn-add" onclick="addAccount()">✅ 계정 추가</button>
</div>

<h3 style="font-size:14px;color:#374151;">결과</h3>
<div id="result">검색 버튼을 누르세요...</div>

<script>
const log = t => { document.getElementById('result').textContent = t; };
const logHtml = h => { document.getElementById('result').innerHTML = h; };

async function searchAccount() {
  const id = document.getElementById('searchId').value.trim();
  if (!id) { log('아이디를 입력하세요.'); return; }
  log('검색 중...');
  try {
    const r = await fetch('tables/student_profiles?search=' + encodeURIComponent(id) + '&limit=30');
    const d = await r.json();
    const rows = (d.data || []).filter(x => x.student_id === id || (x.student_id||'').includes(id) || (x.name||'').includes(id));
    if (!rows.length) {
      logHtml(`<span class="warn">⚠️ "${id}" 계정을 찾을 수 없습니다.\n전체 목록을 확인하거나 신규 추가하세요.</span>`);
      return;
    }
    let out = `✅ ${rows.length}건 발견:\n\n`;
    rows.forEach(r => {
      out += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      out += `record id  : ${r.id}\n`;
      out += `student_id : ${r.student_id}\n`;
      out += `name       : ${r.name}\n`;
      out += `password   : ${r.password || '(없음 - 기본값 dvl2024! 사용됨)'}\n`;
      out += `status     : ${r.status}\n`;
      out += `stage      : ${r.stage}\n`;
      out += `school     : ${r.school}\n`;
      out += `grade      : ${r.grade}\n\n`;
    });
    document.getElementById('fixRecordId').value = rows[0].id;
    logHtml(`<pre style="margin:0">${out}</pre>`);
  } catch(e) {
    logHtml(`<span class="err">오류: ${e.message}</span>`);
  }
}

async function listAll() {
  log('전체 목록 조회 중...');
  try {
    const r = await fetch('tables/student_profiles?limit=100&sort=student_id');
    const d = await r.json();
    const rows = d.data || [];
    let out = `총 ${rows.length}명:\n\n`;
    rows.forEach(r => {
      const pw = r.password ? `pw: ${r.password}` : '⚠️ 비밀번호 없음';
      out += `[${r.student_id || '(id없음)'}] ${r.name || '(이름없음)'}  ${pw}  status:${r.status}  id:${r.id}\n`;
    });
    logHtml(`<pre style="margin:0">${out}</pre>`);
  } catch(e) {
    logHtml(`<span class="err">오류: ${e.message}</span>`);
  }
}

async function fixPassword() {
  const recId = document.getElementById('fixRecordId').value.trim();
  const pw    = document.getElementById('fixPw').value.trim();
  if (!recId || !pw) { log('record ID와 비밀번호를 모두 입력하세요.'); return; }
  log('수정 중...');
  try {
    const r = await fetch('tables/student_profiles/' + recId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, status: 'active' })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    logHtml(`<span class="ok">✅ 비밀번호 수정 완료!\nstudent_id: ${d.student_id}\npassword: ${d.password}\nstatus: ${d.status}</span>`);
  } catch(e) {
    logHtml(`<span class="err">오류: ${e.message}</span>`);
  }
}

async function deleteEmpty() {
  log('빈 행 삭제 중...');
  try {
    const r = await fetch('tables/student_profiles?limit=100');
    const d = await r.json();
    const empties = (d.data || []).filter(row => !row.student_id && !row.name);
    if (!empties.length) { logHtml('<span class="ok">빈 행 없음.</span>'); return; }
    for (const row of empties) {
      await fetch('tables/student_profiles/' + row.id, { method: 'DELETE' });
    }
    logHtml(`<span class="ok">✅ 빈 행 ${empties.length}개 삭제 완료.</span>`);
  } catch(e) {
    logHtml(`<span class="err">오류: ${e.message}</span>`);
  }
}

async function addAccount() {
  const sid    = document.getElementById('newId').value.trim();
  const name   = document.getElementById('newName').value.trim();
  const school = document.getElementById('newSchool').value.trim();
  const grade  = document.getElementById('newGrade').value.trim();
  const stage  = document.getElementById('newStage').value;
  const pw     = document.getElementById('newPw').value.trim();
  if (!sid || !name || !pw) { log('아이디, 이름, 비밀번호는 필수입니다.'); return; }
  log('추가 중...');
  try {
    const r = await fetch('tables/student_profiles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_id: sid, name, school, grade, stage,
        password: pw, status: 'active', memo: ''
      })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    logHtml(`<span class="ok">✅ 계정 추가 완료!\nid: ${d.id}\nstudent_id: ${d.student_id}\nname: ${d.name}\npassword: ${d.password}</span>`);
  } catch(e) {
    logHtml(`<span class="err">오류: ${e.message}</span>`);
  }
}

// 자동 검색
window.onload = () => setTimeout(searchAccount, 500);
</script>
</body>
</html>
