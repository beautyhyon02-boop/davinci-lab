  <style>
    :root{
      --ep-main:#4f46e5; --ep-light:#e0e7ff; --ep-accent:#818cf8;
      --ep-success:#10b981; --ep-warn:#f59e0b; --ep-danger:#ef4444;
      --ep-gray:#6b7280; --ep-border:#e5e7eb; --ep-bg:#f9fafb;
    }
    .ep-wrap{padding:24px;max-width:1400px;margin:0 auto}
    .ep-summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
    @media(max-width:900px){.ep-summary-row{grid-template-columns:repeat(2,1fr)}}
    .ep-sum-card{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px}
    .ep-sum-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
    .ep-sum-card .sc-val{font-size:1.8rem;font-weight:800;color:#1e1b4b}
    .ep-sum-card .sc-label{font-size:.82rem;color:#6b7280}

    .ep-actionbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .ep-actionbar h2{font-size:1.15rem;font-weight:700;color:#1e1b4b}
    .ep-search-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .ep-search-wrap input,.ep-search-wrap select{
      padding:9px 14px;border:1.5px solid var(--ep-border);border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff
    }
    .ep-search-wrap input{width:220px}
    .ep-search-wrap input:focus,.ep-search-wrap select:focus,
    .modal-form input:focus,.modal-form select:focus,.modal-form textarea:focus,
    .dp-input:focus,.dp-select:focus,.dp-textarea:focus{
      outline:none;border-color:var(--ep-main)
    }

    .btn-ep-create,.btn-modal-save{
      background:var(--ep-main);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700
    }
    .btn-ep-create{padding:10px 20px;font-size:.9rem}
    .btn-ep-create:hover,.btn-modal-save:hover{background:#4338ca}
    .btn-modal-cancel{
      flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--ep-border);
      background:#fff;color:#374151;font-weight:600;cursor:pointer
    }
    .btn-modal-save{flex:2;padding:12px;border-radius:10px}

    .ep-table-wrap{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
    .ep-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .ep-table th{
      background:#f9fafb;padding:12px 16px;text-align:left;font-weight:700;color:#374151;
      border-bottom:1.5px solid var(--ep-border);white-space:nowrap
    }
    .ep-table td{padding:13px 16px;border-bottom:1px solid #f3f4f6;color:#4b5563;vertical-align:middle}
    .ep-table tr:hover td{background:#fafafa}
    .ep-table tr:last-child td{border-bottom:none}

    .status-badge{font-size:.75rem;padding:3px 10px;border-radius:99px;font-weight:700;white-space:nowrap}
    .status-badge.ongoing{background:#dbeafe;color:#1d4ed8}
    .status-badge.done{background:#d1fae5;color:#065f46}
    .status-badge.pending{background:#fef3c7;color:#92400e}

    .sync-badge{
      display:inline-flex;align-items:center;gap:4px;font-size:.68rem;padding:3px 8px;border-radius:999px;
      background:#f3f4f6;color:#4b5563;font-weight:700
    }
    .sync-badge.bridge{background:#ede9fe;color:#5b21b6}
    .sync-badge.table{background:#d1fae5;color:#065f46}
    .sync-badge.legacy{background:#fef3c7;color:#92400e}

    .dday-tag{
      font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:99px;background:#ede9fe;color:#5b21b6
    }
    .dday-tag.urgent{background:#fee2e2;color:#991b1b}
    .dday-tag.done{background:#f3f4f6;color:#6b7280}

    .prog-mini{height:6px;background:#f3f4f6;border-radius:99px;width:100px;overflow:hidden}
    .prog-mini-fill{height:100%;border-radius:99px;background:var(--ep-success)}

    .btn-ep-action{
      padding:5px 12px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:background .15s
    }
    .btn-ep-view{background:var(--ep-light);color:var(--ep-main)}
    .btn-ep-view:hover{background:#c7d2fe}
    .btn-ep-del{background:#fee2e2;color:#991b1b}
    .btn-ep-del:hover{background:#fecaca}

    .detail-panel{
      position:fixed;top:0;right:-620px;width:600px;max-width:92vw;height:100vh;background:#fff;
      box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:9000;overflow-y:auto;transition:right .3s
    }
    .detail-panel.open{right:0}
    .dp-header{
      padding:24px;border-bottom:1.5px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;background:#fff;z-index:1
    }
    .dp-header h3{font-size:1.08rem;font-weight:700;color:#1e1b4b}
    .dp-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9ca3af}
    .dp-close:hover{color:#374151}
    .dp-body{padding:24px}
    .dp-section-title{
      font-size:.85rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;
      display:flex;align-items:center;gap:6px
    }
    .dp-section-title::after{content:'';flex:1;height:1px;background:#f3f4f6}
    .dp-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .dp-input,.dp-select,.dp-textarea{
      width:100%;padding:8px 10px;border:1.5px solid var(--ep-border);border-radius:7px;
      font-family:inherit;font-size:.9rem;box-sizing:border-box;background:#fff
    }
    .dp-textarea{resize:vertical}
    .dp-save-btn{
      margin-top:10px;width:100%;padding:10px;border-radius:8px;border:none;background:var(--ep-main);
      color:#fff;font-weight:700;cursor:pointer
    }

    .week-date-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .week-date-tab{
      padding:5px 12px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;
      border:1.5px solid var(--ep-border);background:#fff;color:#6b7280;transition:all .2s
    }
    .week-date-tab.active{background:var(--ep-main);color:#fff;border-color:var(--ep-main)}

    .task-edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .task-date-title{font-size:.8rem;font-weight:700;color:#6b7280;margin:8px 0 4px;padding-left:4px}
    .task-card{
      display:flex;flex-direction:column;gap:6px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--ep-border);margin-bottom:6px
    }
    .task-card.done{background:#f0fdf4;border-left:3px solid #34d399}
    .task-card.pending{border-left:3px solid transparent}
    .task-top{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .task-pill{
      font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;background:#f3f4f6;color:#6b7280
    }
    .task-pill.done{background:#d1fae5;color:#047857}
    .task-comment-row{display:flex;align-items:center;gap:6px}
    .task-meta-note{
      font-size:11.5px;color:#6b7280;background:#f9fafb;border-radius:6px;padding:5px 8px
    }
    .btn-del-task{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:.9rem;margin-left:auto}
    .btn-del-task:hover{color:var(--ep-danger)}
    .btn-add-task{
      width:100%;padding:8px;border:1.5px dashed #d1d5db;border-radius:7px;background:none;color:#9ca3af;cursor:pointer;
      font-size:.85rem;transition:all .2s
    }
    .btn-add-task:hover{border-color:var(--ep-main);color:var(--ep-main)}

    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999
    }
    .modal-overlay.open{display:flex}
    .modal-box{
      background:#fff;border-radius:16px;padding:32px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative
    }
    .modal-box h3{font-size:1.2rem;font-weight:700;margin-bottom:20px;color:#1e1b4b}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9ca3af}
    .modal-form{display:flex;flex-direction:column;gap:14px}
    .modal-form label{font-size:.85rem;font-weight:600;color:#374151;margin-bottom:4px;display:block}
    .modal-form input,.modal-form select,.modal-form textarea{
      width:100%;padding:10px 14px;border:1.5px solid var(--ep-border);border-radius:8px;font-size:.95rem;font-family:inherit;box-sizing:border-box
    }
    .modal-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-actions{display:flex;gap:10px;margin-top:8px}
    .student-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;max-height:220px;overflow-y:auto}
    .student-chip{
      padding:7px 10px;border-radius:8px;border:1.5px solid var(--ep-border);cursor:pointer;font-size:.83rem;font-weight:600;
      color:#374151;transition:all .2s;text-align:center;background:#fff
    }
    .student-chip:hover{border-color:var(--ep-main);color:var(--ep-main)}
    .student-chip.selected{background:var(--ep-light);border-color:var(--ep-main);color:var(--ep-main)}

    .ep-toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1b4b;color:#fff;padding:12px 24px;border-radius:30px;
      font-size:.9rem;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none
    }
    .ep-toast.show{opacity:1}
    .ep-empty{text-align:center;padding:60px 24px;color:#9ca3af}
    .ep-empty i{font-size:2.5rem;margin-bottom:12px;display:block}
    .ep-empty p{font-size:.95rem}
  </style>
</head>

  <script>
    const TABLE_PLANNERS = 'exam_planners';
    const TABLE_TASKS = 'planner_tasks';
    const TABLE_SCHEDULES = 'exam_schedules';
    const TABLE_PROFILES = 'student_profiles';

    const SUBJECT_COLORS = {
      '수학':'math','영어':'eng','국어':'kor','과학':'sci','사회':'soc','한국사':'hist'
    };
    const WEEK_DEFS = [
      { id:'pre', cls:'pre', emoji:'🌱', name:'PRE주차', subtitle:'플래너 적응 & 범위 파악' },
      { id:'w1', cls:'w1', emoji:'📘', name:'1주차', subtitle:'전체 범위 1회독' },
      { id:'w2', cls:'w2', emoji:'📕', name:'2주차', subtitle:'약점 보완 & 심화' },
      { id:'w3', cls:'w3', emoji:'📙', name:'3주차', subtitle:'실전 문제 풀이' },
      { id:'w4', cls:'w4', emoji:'🔥', name:'4주차', subtitle:'최종 점검 & 시험' }
    ];

    let allStudents = [];
    let allPlannerRows = [];
    let allTaskRows = [];
    let filteredPlanners = [];
    let selectedStudentIds = new Set();
    let currentDetailPlanner = null;
    let detailTasks = [];
    let detailWeekKey = '';

    function safeParseJSON(value, fallback) {
      if (value == null || value === '') return fallback;
      if (typeof value === 'object') return value;
      try { return JSON.parse(value); } catch (_) { return fallback; }
    }

    function normalizeArray(value) {
      if (Array.isArray(value)) return value.filter(Boolean);
      if (typeof value === 'string') {
        const parsed = safeParseJSON(value, null);
        if (Array.isArray(parsed)) return parsed.filter(Boolean);
        return value.split(',').map(v => v.trim()).filter(Boolean);
      }
      return [];
    }

    function escapeHtml(str='') {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function escapeAttr(str='') {
      return escapeHtml(str).replace(/`/g, '&#096;');
    }

    function unwrapData(payload) {
      return payload?.data || payload?.record || payload || null;
    }

    function unwrapList(payload) {
      return payload?.data || payload?.records || payload || [];
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function toYmd(input) {
      const d = input instanceof Date ? new Date(input) : new Date(input);
      if (Number.isNaN(d.getTime())) return '';
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function addDays(input, days) {
      const d = input instanceof Date ? new Date(input) : new Date(input);
      d.setDate(d.getDate() + days);
      return d;
    }
    function minToTime(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return `${pad(h)}:${pad(m)}`;
    }
    function fmt(dateStr) {
      if (!dateStr) return '';
      const [y,m,d] = String(dateStr).split('-');
      return `${y}.${m}.${d}`;
    }
    function getDayName(dateStr) {
      const d = new Date(dateStr);
      return ['일','월','화','수','목','금','토'][d.getDay()];
    }
    function getColorTag(subject='') {
      for (const [k,v] of Object.entries(SUBJECT_COLORS)) {
        if (String(subject).includes(k)) return v;
      }
      return 'etc';
    }
    function normalizeStatus(value) {
      const v = String(value || '').trim().toLowerCase();
      if (['active','진행중','진행 중','ongoing','in_progress'].includes(v)) return 'active';
      if (['completed','완료','done','closed'].includes(v)) return 'completed';
      if (['draft','준비중','준비 중','pending','대기'].includes(v)) return 'draft';
      return 'active';
    }
    function statusLabel(code) {
      return code === 'completed' ? '완료' : code === 'draft' ? '준비중' : '진행중';
    }
    function statusBadgeClass(code) {
      return code === 'completed' ? 'done' : code === 'draft' ? 'pending' : 'ongoing';
    }
    function getProgressPct(done, total) {
      return total > 0 ? Math.round((done / total) * 100) : 0;
    }

    function getDday(examDateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const exam = new Date(examDateStr); exam.setHours(0,0,0,0);
      const diff = Math.ceil((exam - today) / 86400000);
      if (diff > 0) return { text:`D-${diff}`, className: diff <= 7 ? 'urgent' : '' };
      if (diff === 0) return { text:'D-DAY', className:'urgent' };
      return { text:`D+${Math.abs(diff)}`, className:'done' };
    }

    function computePlanStartDate(examStartDate) {
      const d = new Date(examStartDate);
      d.setDate(d.getDate() - 28);
      return toYmd(d);
    }

    function buildWeeksData(planStartDate, examStartDate) {
      const startDate = new Date(planStartDate);
      const examDate = new Date(examStartDate);
      const totalDays = Math.max(1, Math.ceil((examDate - startDate) / 86400000));
      let weekConfigs;

      if (totalDays >= 35) {
        weekConfigs = [
          { ...WEEK_DEFS[0], days: 7 }, { ...WEEK_DEFS[1], days: 7 },
          { ...WEEK_DEFS[2], days: 7 }, { ...WEEK_DEFS[3], days: 7 },
          { ...WEEK_DEFS[4], days: totalDays - 28 }
        ];
      } else if (totalDays >= 28) {
        weekConfigs = [
          { ...WEEK_DEFS[0], days: totalDays - 28 }, { ...WEEK_DEFS[1], days: 7 },
          { ...WEEK_DEFS[2], days: 7 }, { ...WEEK_DEFS[3], days: 7 }, { ...WEEK_DEFS[4], days: 7 }
        ].filter(w => w.days > 0);
      } else if (totalDays >= 21) {
        const per = Math.floor(totalDays / 4);
        const extra = totalDays - per * 4;
        weekConfigs = [
          { ...WEEK_DEFS[1], days: per + (extra > 0 ? 1 : 0) },
          { ...WEEK_DEFS[2], days: per + (extra > 1 ? 1 : 0) },
          { ...WEEK_DEFS[3], days: per + (extra > 2 ? 1 : 0) },
          { ...WEEK_DEFS[4], days: per }
        ].filter(w => w.days > 0);
      } else if (totalDays >= 14) {
        const per = Math.floor(totalDays / 3);
        const extra = totalDays - per * 3;
        weekConfigs = [
          { ...WEEK_DEFS[2], days: per + (extra > 0 ? 1 : 0) },
          { ...WEEK_DEFS[3], days: per + (extra > 1 ? 1 : 0) },
          { ...WEEK_DEFS[4], days: per }
        ].filter(w => w.days > 0);
      } else if (totalDays >= 7) {
        const per = Math.floor(totalDays / 2);
        weekConfigs = [
          { ...WEEK_DEFS[3], days: per },
          { ...WEEK_DEFS[4], days: totalDays - per }
        ].filter(w => w.days > 0);
      } else {
        weekConfigs = [{ ...WEEK_DEFS[4], days: totalDays }];
      }

      const weeks = [];
      let cursor = new Date(startDate);

      weekConfigs.forEach(cfg => {
        const weekStart = new Date(cursor);
        const dayDates = [];
        for (let i = 0; i < cfg.days; i++) {
          dayDates.push(toYmd(cursor));
          cursor.setDate(cursor.getDate() + 1);
        }
        const weekEnd = new Date(cursor);
        weekEnd.setDate(weekEnd.getDate() - 1);
        weeks.push({
          id: cfg.id,
          cls: cfg.cls,
          emoji: cfg.emoji,
          name: cfg.name,
          subtitle: cfg.subtitle,
          start_date: toYmd(weekStart),
          end_date: toYmd(weekEnd),
          day_count: cfg.days,
          day_dates: dayDates
        });
      });

      return weeks;
    }

    function getWeekForDate(weeks, dateStr) {
      return (weeks || []).find(w => dateStr >= w.start_date && dateStr <= w.end_date) || null;
    }

    function taskStrategyByWeek(weekId='w1') {
      if (weekId === 'pre') return '범위 파악';
      if (weekId === 'w1') return '개념 정리';
      if (weekId === 'w2') return '문제풀이';
      if (weekId === 'w3') return '기출·프린트';
      return '오답·회독';
    }

    function stageNameByWeek(weekId='w1') {
      if (weekId === 'pre') return '개념이해';
      if (weekId === 'w1') return '개념완성';
      if (weekId === 'w2') return '유형문제';
      if (weekId === 'w3') return '심화문제';
      return '최종문제';
    }

    function createDefaultTaskRows({ plannerId='', studentId='', subjects=[], planStartDate, examStartDate }) {
      const rows = [];
      const weeks = buildWeeksData(planStartDate, examStartDate);
      const priority = subjects.filter(s => ['수학','영어','국어'].some(k => String(s).includes(k)));
      const others = subjects.filter(s => !priority.includes(s));
      const start = new Date(planStartDate);
      const end = new Date(examStartDate);

      for (let d = new Date(start), idx = 0; d <= end; d.setDate(d.getDate() + 1), idx++) {
        const dateStr = toYmd(d);
        const week = getWeekForDate(weeks, dateStr);
        const weekNum = Math.max(1, weeks.findIndex(w => w.id === (week?.id || 'w1')) + 1);
        const strategy = taskStrategyByWeek(week?.id || 'w1');
        if (d.getDay() === 0) continue;

        let col = 1;
        if (priority.some(s => String(s).includes('수학'))) {
          rows.push({
            planner_id: plannerId, student_id: studentId, task_date: dateStr, subject: '수학',
            subject_type: '주요', week_num: weekNum, is_done: false,
            task_content: `수학 – ${strategy}`, col_order: col++, color_tag: 'math',
            student_memo: '', admin_comment: ''
          });
        }
        if (priority.some(s => String(s).includes('영어'))) {
          rows.push({
            planner_id: plannerId, student_id: studentId, task_date: dateStr, subject: '영어',
            subject_type: '주요', week_num: weekNum, is_done: false,
            task_content: `영어 – 단어 30개 + ${strategy}`, col_order: col++, color_tag: 'eng',
            student_memo: '', admin_comment: ''
          });
        }
        if (idx % 2 === 0 && priority.some(s => String(s).includes('국어'))) {
          rows.push({
            planner_id: plannerId, student_id: studentId, task_date: dateStr, subject: '국어',
            subject_type: '주요', week_num: weekNum, is_done: false,
            task_content: `국어 – ${strategy}`, col_order: col++, color_tag: 'kor',
            student_memo: '', admin_comment: ''
          });
        }
        if (others.length > 0) {
          const sub = others[idx % others.length];
          rows.push({
            planner_id: plannerId, student_id: studentId, task_date: dateStr, subject: sub,
            subject_type: '보조', week_num: weekNum, is_done: false,
            task_content: `${sub} – ${strategy}`, col_order: col++, color_tag: getColorTag(sub),
            student_memo: '', admin_comment: ''
          });
        }
      }
      return rows;
    }

    function extractLegacyTaskRows(planner) {
      const daily = safeParseJSON(planner.daily_tasks, planner.daily_tasks || {});
      const rows = [];
      Object.entries(daily || {}).forEach(([dateStr, dayTask]) => {
        const completed = Array.isArray(dayTask?.completed_slots) ? dayTask.completed_slots : [];
        const slots = Array.isArray(dayTask?.slots) ? dayTask.slots : [];
        slots.forEach((slot, idx) => {
          if (!slot || slot.type === 'rest' || slot.type === 'meal') return;
          const subject = slot.subject || '';
          const taskText = slot.user_text || slot.task_text || slot.stage || '학습';
          rows.push({
            id: `legacy_${planner.id}_${dateStr}_${idx}`,
            planner_id: planner.id,
            student_id: planner.student_id,
            task_date: dateStr,
            subject,
            subject_type: subject ? '주요' : '보조',
            week_num: 1,
            is_done: Boolean(slot.completed || completed.includes(idx)),
            task_content: taskText,
            col_order: idx + 1,
            color_tag: getColorTag(subject),
            student_memo: dayTask?.memo || '',
            admin_comment: ''
          });
        });
      });
      return rows.sort((a,b) => (a.task_date + String(a.col_order)).localeCompare(b.task_date + String(b.col_order)));
    }

    function buildDailyTasksFromTaskRows(taskRows, existingDailyTasks, planStartDate, examEndDate) {
      const weeks = buildWeeksData(planStartDate, examEndDate);
      const existing = safeParseJSON(existingDailyTasks, existingDailyTasks || {});
      const grouped = {};
      (taskRows || []).forEach(task => {
        const key = task.task_date;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(task);
      });

      const daily = {};
      for (let d = new Date(planStartDate); d <= new Date(examEndDate); d.setDate(d.getDate() + 1)) {
        const dateStr = toYmd(d);
        const week = getWeekForDate(weeks, dateStr);
        const prev = existing[dateStr] || {};
        const rows = (grouped[dateStr] || []).sort((a,b) => (a.col_order || 0) - (b.col_order || 0));
        const isWeekend = d.getDay() === 0 || d.getDay() === 6;
        const startMin = Number.isFinite(prev.start_minutes) ? prev.start_minutes : (isWeekend ? 480 : 960);

        const slots = rows.map((task, idx) => {
          const s = startMin + idx * 80;
          const e = s + 70;
          const subject = task.subject || '';
          const stage = stageNameByWeek(week?.id || 'w1');
          return {
            type: 'study',
            start_min: s,
            end_min: e,
            time: `${minToTime(s)}~${minToTime(e)}`,
            subject,
            subject_emoji: '📘',
            stage,
            stage_emoji: '📝',
            stage_id: idx + 1,
            task_text: task.task_content || (subject ? `${subject} 학습` : '학습'),
            completed: !!task.is_done,
            cornell_written: false,
            editable: true,
            user_text: ''
          };
        });

        daily[dateStr] = {
          date: dateStr,
          day_of_week: ['일','월','화','수','목','금','토'][d.getDay()],
          is_weekend: isWeekend,
          start_minutes: startMin,
          week_id: week?.id || 'w1',
          slots,
          completed_slots: slots.map((slot, idx) => slot.completed ? idx : -1).filter(idx => idx >= 0),
          memo: prev.memo || '',
          mood: prev.mood || '',
          vocab_done: prev.vocab_done || 0,
          vocab_total: prev.vocab_total || 20
        };
      }
      return daily;
    }

    function normalizeTask(row) {
      return {
        id: row.id || '',
        planner_id: row.planner_id || '',
        student_id: row.student_id || '',
        task_date: row.task_date || '',
        subject: row.subject || '',
        subject_type: row.subject_type || '주요',
        week_num: Number(row.week_num || 1),
        is_done: row.is_done === true || row.is_done === 'true',
        task_content: row.task_content || '',
        col_order: Number(row.col_order || 0),
        color_tag: row.color_tag || getColorTag(row.subject || ''),
        student_memo: row.student_memo || '',
        admin_comment: row.admin_comment || ''
      };
    }

    function getSyncMode(planner, taskRows) {
      const hasTaskTable = (taskRows || []).length > 0;
      const hasLegacy = !!planner.daily_tasks;
      if (hasTaskTable && hasLegacy) return 'bridge';
      if (hasTaskTable) return 'table';
      if (hasLegacy) return 'legacy';
      return 'table';
    }

    function normalizePlanner(row) {
      const planner = { ...row };
      planner.subjects = normalizeArray(planner.subjects);
      planner.weeks_data = safeParseJSON(planner.weeks_data, planner.weeks_data || []);
      planner.daily_tasks = safeParseJSON(planner.daily_tasks, planner.daily_tasks || {});
      planner.year = String(planner.year || planner.school_year || new Date().getFullYear());
      planner.school_year = planner.year;
      planner.semester = planner.semester || '1학기';
      planner.plan_start_date = planner.plan_start_date || computePlanStartDate(planner.exam_start_date);
      planner.status_code = normalizeStatus(planner.status);
      planner.status_label = statusLabel(planner.status_code);

      const tableTasks = allTaskRows
        .filter(t => String(t.planner_id) === String(planner.id))
        .map(normalizeTask);

      const effectiveTasks = tableTasks.length > 0 ? tableTasks : extractLegacyTaskRows(planner);
      planner.task_rows = effectiveTasks;
      planner.task_count = effectiveTasks.length;
      planner.done_count = effectiveTasks.filter(t => t.is_done).length;
      planner.progress_pct = getProgressPct(planner.done_count, planner.task_count);
      if (!planner.subjects.length) {
        planner.subjects = [...new Set(effectiveTasks.map(t => t.subject).filter(Boolean))];
      }
      planner.sync_mode = getSyncMode(planner, tableTasks);
      return planner;
    }

    function chunk(array, size) {
      const out = [];
      for (let i = 0; i < array.length; i += size) out.push(array.slice(i, i + size));
      return out;
    }

    function showToast(msg) {
      const el = document.getElementById('epToast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2600);
    }

    function closeModal(id) {
      document.getElementById(id)?.classList.remove('open');
    }

    function waitForSession(cb, timeout = 5000) {
      const started = Date.now();
      function check() {
        let s = window._dvlAdminSession;
        if (!s) {
          try { s = JSON.parse(sessionStorage.getItem('dvl_admin_tab_session') || 'null'); } catch(_) {}
        }
        if (!s) {
          try { s = JSON.parse(localStorage.getItem('dvl_admin_session') || 'null'); } catch(_) {}
        }
        if (s && (s.role === 'admin' || s.role === 'master')) return cb(s);
        if (Date.now() - started > timeout) return cb(null);
        setTimeout(check, 120);
      }
      check();
    }

    document.addEventListener('DOMContentLoaded', () => {
      fillYearOptions();
      document.getElementById('createStartDate')?.addEventListener('change', autoSetEndDate);
      document.getElementById('createExamType')?.addEventListener('change', autoSetEndDate);
      waitForSession(async (session) => {
        if (session) {
          const adminName = session.name || '관리자';
          document.getElementById('topbarAdminName').textContent = adminName;
          document.getElementById('sidebarAdminName').textContent = adminName;
        }
        await refreshAllData();
      });
    });

    function fillYearOptions() {
      const el = document.getElementById('createYear');
      if (!el) return;
      const now = new Date().getFullYear();
      el.innerHTML = '';
      [now - 1, now, now + 1].forEach(y => {
        const option = document.createElement('option');
        option.value = String(y);
        option.textContent = `${y}년`;
        if (y === now) option.selected = true;
        el.appendChild(option);
      });
    }

    function autoSetEndDate() {
      const startVal = document.getElementById('createStartDate').value;
      const examType = document.getElementById('createExamType').value;
      if (!startVal) return;
      const start = new Date(startVal);
      const extraDays = examType === '기말고사' ? 3 : examType === '중간고사' ? 2 : examType === '모의고사' ? 0 : 1;
      start.setDate(start.getDate() + extraDays);
      document.getElementById('createEndDate').value = toYmd(start);
    }

    async function refreshAllData() {
      await Promise.all([loadStudents(), loadPlanners()]);
    }

    async function loadStudents() {
      try {
        const res = await fetch(`/tables/${TABLE_PROFILES}?limit=300&sort=student_id`);
        const data = await res.json();
        allStudents = unwrapList(data).filter(s => String(s.status || '').trim() !== '졸업');
      } catch (_) {
        allStudents = [];
      }
      renderStudentChips('');
    }

    function renderStudentChips(query='') {
      const container = document.getElementById('studentChips');
      const q = query.trim().toLowerCase();
      const list = q ? allStudents.filter(s =>
        String(s.name || '').toLowerCase().includes(q) ||
        String(s.student_id || '').toLowerCase().includes(q)
      ) : allStudents;

      container.innerHTML = list.map(s => `
        <div class="student-chip ${selectedStudentIds.has(String(s.student_id)) ? 'selected' : ''}"
             onclick="toggleStudentChip('${escapeAttr(String(s.student_id))}', this)">
          ${escapeHtml(s.name || '학생')}<br>
          <small style="font-weight:400;opacity:.7">${escapeHtml(s.student_id || '')}</small>
        </div>
      `).join('');
    }

    function filterStudentChips() {
      renderStudentChips(document.getElementById('studentSearch').value || '');
    }

    function toggleStudentChip(id, el) {
      const key = String(id);
      if (selectedStudentIds.has(key)) {
        selectedStudentIds.delete(key);
        el.classList.remove('selected');
      } else {
        selectedStudentIds.add(key);
        el.classList.add('selected');
      }
    }

    async function loadPlanners() {
      try {
        const [planRes, taskRes] = await Promise.all([
          fetch(`/tables/${TABLE_PLANNERS}?limit=500`),
          fetch(`/tables/${TABLE_TASKS}?limit=5000`)
        ]);
        const [planData, taskData] = await Promise.all([planRes.json(), taskRes.json()]);
        allPlannerRows = unwrapList(planData);
        allTaskRows = unwrapList(taskData).map(normalizeTask);
      } catch (_) {
        allPlannerRows = [];
        allTaskRows = [];
      }

      filteredPlanners = allPlannerRows.map(normalizePlanner).sort((a, b) => {
        const ad = new Date(a.exam_start_date || '2100-01-01').getTime();
        const bd = new Date(b.exam_start_date || '2100-01-01').getTime();
        return ad - bd;
      });

      renderSummary();
      renderTable();
    }

    function renderSummary() {
      const ongoing = filteredPlanners.filter(p => p.status_code === 'active');
      const urgent = ongoing.filter(p => {
        const exam = new Date(p.exam_start_date); exam.setHours(0,0,0,0);
        const today = new Date(); today.setHours(0,0,0,0);
        return Math.ceil((exam - today) / 86400000) <= 7;
      });
      const highProg = filteredPlanners.filter(p => p.progress_pct >= 70);

      document.getElementById('sumTotal').textContent = filteredPlanners.length;
      document.getElementById('sumOngoing').textContent = ongoing.length;
      document.getElementById('sumUrgent').textContent = urgent.length;
      document.getElementById('sumHighProg').textContent = highProg.length;
    }

    function renderSyncBadge(mode) {
      if (mode === 'bridge') return '<span class="sync-badge bridge"><i class="fas fa-link"></i> 브릿지</span>';
      if (mode === 'legacy') return '<span class="sync-badge legacy"><i class="fas fa-database"></i> 레거시</span>';
      return '<span class="sync-badge table"><i class="fas fa-table"></i> 통합</span>';
    }

        const matchQ = !search ||
          String(p.student_name || '').toLowerCase().includes(search) ||
          String(p.student_id || '').toLowerCase().includes(search);
        const matchS = !status || p.status_code === status;
        return matchQ && matchS;
      });

      if (!rows.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      tbody.innerHTML = rows.map(p => {
        const dday = getDday(p.exam_start_date);
        return `
          <tr>
            <td>
              <strong>${escapeHtml(p.student_name || p.student_id || '학생')}</strong><br>
              <small style="color:#9ca3af">${escapeHtml(p.student_id || '')}</small>
            </td>
            <td>${escapeHtml(p.exam_type || '-')}</td>
            <td style="white-space:nowrap
            ${fmt(p.exam_start_date)}<br>
              <small style="color:#9ca3af">~ ${fmt(p.exam_end_date)}</small>
            </td>
            <td><span class="dday-tag ${dday.className}">${dday.text}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="prog-mini"><div class="prog-mini-fill" style="width:${p.progress_pct}%"></div></div>
                <span style="font-size:.78rem;color:#6b7280">${p.progress_pct}%</span>
              </div>
            </td>
            <td style="text-align:center">${p.subjects.length}개</td>
            <td><span class="status-badge ${statusBadgeClass(p.status_code)}">${p.status_label}</span></td>
            <td>${renderSyncBadge(p.sync_mode)}</td>
            <td>
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                <button class="btn-ep-action btn-ep-view" onclick="openDetail('${escapeAttr(String(p.id))}')">
                  <i class="fas fa-edit"></i> 편집
                </button>
                <button class="btn-ep-action btn-ep-del" onclick="deletePlanner('${escapeAttr(String(p.id))}','${escapeAttr(String(p.student_name || p.student_id || '학생'))}')">
                  <i class="fas fa-trash"></i>

    function filterPlanners() {
      renderTable();

    function getPlannerFromState(plannerId) {
      return filteredPlanners.find(p => String(p.id) === String(plannerId)) || null;
    }

    async function fetchTaskRowsForPlanner(studentId, plannerId) {
      try {
        const res = await fetch(`/tables/${TABLE_TASKS}?search=${encodeURIComponent(studentId)}&limit=5000`);
        const data = await res.json();
        return unwrapList(data)
          .map(normalizeTask)
          .filter(t => String(t.student_id) === String(studentId) && String(t.planner_id) === String(plannerId))
          .sort((a,b) => {
            if (a.task_date !== b.task_date) return String(a.task_date).localeCompare(String(b.task_date));
            return Number(a.col_order || 0) - Number(b.col_order || 0);
          });
      } catch (_) {
        return [];
      }
    }

    async function patchPlannerRecord(plannerId, payload) {
      const res = await fetch(`/tables/${TABLE_PLANNERS}/${plannerId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return await res.json().catch(() => ({}));
    }

    async function createTaskRowsBulk(rows) {
      const groups = chunk(rows, 20);
      for (const group of groups) {
        await Promise.all(group.map(row =>
          fetch(`/tables/${TABLE_TASKS}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(row)
          })
        ));
      }
    }

    async function syncPlannerBridge(plannerLike, taskRows = null) {
      if (!plannerLike || !plannerLike.id) return;
      const planner = { ...plannerLike };
      const effectiveTasks = Array.isArray(taskRows) ? taskRows : await fetchTaskRowsForPlanner(planner.student_id, planner.id);
      const year = String(planner.year || planner.school_year || new Date().getFullYear());
      const planStartDate = planner.plan_start_date || computePlanStartDate(planner.exam_start_date);
      const weeks = buildWeeksData(planStartDate, planner.exam_start_date);
      const dailyTasks = buildDailyTasksFromTaskRows(
        effectiveTasks,
        planner.daily_tasks || {},
        planStartDate,
        planner.exam_end_date || planner.exam_start_date
      );

      await patchPlannerRecord(planner.id, {
        subjects: normalizeArray(planner.subjects),
        year,
        school_year: year,
        semester: planner.semester || '1학기',
        plan_start_date: planStartDate,
        weeks_data: weeks,
        daily_tasks: dailyTasks,
        status: normalizeStatus(planner.status || planner.status_code || 'active'),
        scope: planner.scope || ''
      });
    }

    function renderDetailDateTabs() {
      const container = document.getElementById('dpTaskDatePicker');
      const weeks = getDetailWeeks();
      container.innerHTML = '';

      weeks.forEach((week, idx) => {
        const btn = document.createElement('button');
        btn.className = 'week-date-tab';
        btn.textContent = `${week.name} (${fmt(week.start_date).slice(5)} ~ ${fmt(week.end_date).slice(5)})`;
        btn.onclick = () => {
          document.querySelectorAll('.week-date-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          detailWeekKey = week.id;
          renderDetailTaskList(week);
        };
        container.appendChild(btn);
        if (idx === 0) {
          btn.classList.add('active');
          detailWeekKey = week.id;
        }
      });

      if (weeks[0]) renderDetailTaskList(weeks[0]);
    }

    function renderDetailTaskList(week) {
      const container = document.getElementById('dpTaskList');
      container.innerHTML = '';
      const subjects = Array.isArray(currentDetailPlanner?.subjects) ? currentDetailPlanner.subjects : [];

      const weekTasks = detailTasks
        .filter(t => t.task_date >= week.start_date && t.task_date <= week.end_date)
        .sort((a,b) => {
          if (a.task_date !== b.task_date) return String(a.task_date).localeCompare(String(b.task_date));
          return Number(a.col_order || 0) - Number(b.col_order || 0);
        });

      const grouped = {};
      weekTasks.forEach(t => {
        if (!grouped[t.task_date]) grouped[t.task_date] = [];
        grouped[t.task_date].push(t);
      });

      if (!Object.keys(grouped).length) {
        container.innerHTML = `<div style="padding:14px;border:1px dashed #d1d5db;border-radius:10px;color:#9ca3af;font-size:.85rem">이 주차에는 등록된 할 일이 없습니다.</div>`;
        return;
      }

      Object.entries(grouped).forEach(([date, tasks]) => {
        const title = document.createElement('div');
        title.className = 'task-date-title';
        title.textContent = `${fmt(date)} (${getDayName(date)})`;
        container.appendChild(title);

        tasks.forEach(t => {
          const row = document.createElement('div');
          row.className = `task-card ${t.is_done ? 'done' : 'pending'}`;
          row.dataset.taskId = t.id || '';
          row.dataset.taskDate = t.task_date || '';
          row.innerHTML = `
            <div class="task-top">
              <span class="task-pill ${t.is_done ? 'done' : ''}">${t.is_done ? '✅ 완료' : '⬜ 미완료'}</span>
              <select class="dp-task-subject dp-select" style="padding:6px 8px;font-size:.82rem;width:auto">
                ${subjects.map(s => `<option value="${escapeAttr(s)}" ${s === t.subject ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
              </select>
              <select class="dp-task-type dp-select" style="padding:6px 8px;font-size:.82rem;width:auto">
                <option value="주요" ${t.subject_type === '주요' ? 'selected' : ''}>주요</option>
                <option value="보조" ${t.subject_type === '보조' ? 'selected' : ''}>보조</option>
                <option value="암기" ${t.subject_type === '암기' ? 'selected' : ''}>암기</option>
              </select>
              <button class="btn-del-task" onclick="removeDetailTask('${escapeAttr(String(t.id || ''))}', this)"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" class="dp-task-content dp-input" value="${escapeAttr(t.task_content || '')}" placeholder="할 일 내용" style="font-size:.85rem" />
            <div class="task-comment-row">
              <i class="fas fa-comment-dots" style="color:#a78bfa;font-size:13px;flex-shrink:0;"></i>
              <input type="text" class="dp-task-comment dp-input" value="${escapeAttr(t.admin_comment || '')}" placeholder="선생님 코멘트 (학생/학부모에게 표시)" style="font-size:.82rem;background:#faf5ff;border-color:#ede9fe" />
            </div>
            ${t.student_memo ? `<div class="task-meta-note"><i class="fas fa-pencil-alt" style="margin-right:4px;color:#9ca3af"></i>학생 메모: ${escapeHtml(t.student_memo)}</div>` : ''}
          `;
          container.appendChild(row);
        });
      });

    async function removeDetailTask(taskId, btn) {
      if (!taskId || String(taskId).startsWith('new_')) {
        btn.closest('.task-card')?.remove();
        return;
      }
      if (!confirm('이 할 일을 삭제할까요?')) return;
      try {
        await fetch(`/tables/${TABLE_TASKS}/${taskId}`, { method: 'DELETE' });
        detailTasks = detailTasks.filter(t => String(t.id) !== String(taskId));
        btn.closest('.task-card')?.remove();
        await syncPlannerBridge(currentDetailPlanner, detailTasks);
        await refreshPlannerDetail(currentDetailPlanner.id);
        renderDetailPanel();
        showToast('🗑️ 삭제되었습니다.');
      } catch (_) {
        showToast('⚠️ 삭제 실패');
      }
    }

    async function saveDetailTasks() {
      const rows = [...document.querySelectorAll('#dpTaskList .task-card')];
      const promises = [];

      rows.forEach((row, idx) => {
        const taskId = row.dataset.taskId || '';
        const taskDate = row.querySelector('.dp-task-date')?.value || row.dataset.taskDate || toYmd(new Date());
        const subject = row.querySelector('.dp-task-subject')?.value || '';
        const type = row.querySelector('.dp-task-type')?.value || '주요';
        const content = row.querySelector('.dp-task-content')?.value?.trim() || '';
        const comment = row.querySelector('.dp-task-comment')?.value?.trim() || '';
        if (!content) return;

        const payload = {
          planner_id: currentDetailPlanner.id,
          student_id: currentDetailPlanner.student_id,
          task_date: taskDate,
          subject,
          subject_type: type,
          week_num: Math.max(1, getDetailWeeks().findIndex(w => taskDate >= w.start_date && taskDate <= w.end_date) + 1),
          is_done: row.classList.contains('done'),
          task_content: content,
          col_order: idx + 1,
          color_tag: getColorTag(subject),
          student_memo: '',
          admin_comment: comment
        };

        if (String(taskId).startsWith('new_')) {
          promises.push(
            fetch(`/tables/${TABLE_TASKS}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            })
          );
        } else {
          promises.push(
            fetch(`/tables/${TABLE_TASKS}/${taskId}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                task_date: taskDate,
                subject,
                subject_type: type,
                task_content: content,
                col_order: idx + 1,
                color_tag: getColorTag(subject),
                admin_comment: comment
              })
            })
          );
        }
      });

      try {
        await Promise.all(promises);
        const freshTasks = await fetchTaskRowsForPlanner(currentDetailPlanner.student_id, currentDetailPlanner.id);
        await syncPlannerBridge(currentDetailPlanner, freshTasks);
        await refreshPlannerDetail(currentDetailPlanner.id);
        renderDetailPanel();
        showToast('✅ 할 일이 저장되었습니다!');
      } catch (e) {
        console.error('[saveDetailTasks]', e);
        showToast('⚠️ 할 일 저장 실패');
      }
    }

    async function saveDetailBasic() {
      const examType = document.getElementById('dpExamType').value;
      const status = document.getElementById('dpStatus').value;
      const startDate = document.getElementById('dpStartDate').value;
      const endDate = document.getElementById('dpEndDate').value || startDate;
      const year = String(document.getElementById('dpYear').value || new Date().getFullYear()).trim();
      const semester = document.getElementById('dpSemester').value;
      const subjects = document.getElementById('dpSubjects').value.split(',').map(s => s.trim()).filter(Boolean);

      if (!startDate || !endDate) {
        showToast('⚠️ 시험 날짜를 입력해주세요.');
        return;
      }

      try {
        const planStartDate = computePlanStartDate(startDate);
        const updatedPlanner = {
          ...currentDetailPlanner,
          exam_type: examType,
          status,
          exam_start_date: startDate,
          exam_end_date: endDate,
          exam_days: Math.max(1, Math.round((new Date(endDate) - new Date(startDate)) / 86400000) + 1),
          year,
          school_year: year,
          semester,
          subjects,
          plan_start_date: planStartDate
        };

        const freshTasks = await fetchTaskRowsForPlanner(currentDetailPlanner.student_id, currentDetailPlanner.id);
        const weeksData = buildWeeksData(planStartDate, startDate);
        const dailyTasks = buildDailyTasksFromTaskRows(freshTasks, currentDetailPlanner.daily_tasks || {}, planStartDate, endDate);

        await patchPlannerRecord(currentDetailPlanner.id, {
          exam_type: examType,
          status,
          exam_start_date: startDate,
          exam_end_date: endDate,
          exam_days: updatedPlanner.exam_days,
          year,
          school_year: year,
          semester,
          subjects,
          plan_start_date: planStartDate,
          weeks_data: weeksData,
          daily_tasks: dailyTasks
        });

        await refreshPlannerDetail(currentDetailPlanner.id);
        renderDetailPanel();
        renderSummary();
        renderTable();
        showToast('✅ 기본 정보가 저장되었습니다!');
      } catch (e) {
        console.error('[saveDetailBasic]', e);
        showToast('⚠️ 저장 실패');
      }
    }

    async function batchCreatePlanners() {
      if (selectedStudentIds.size === 0) {
        showToast('⚠️ 학생을 선택해주세요.');
        return;
      }

      const examType = document.getElementById('createExamType').value;
      const startDate = document.getElementById('createStartDate').value;
      const endDate = document.getElementById('createEndDate').value || startDate;
      const year = String(document.getElementById('createYear').value || new Date().getFullYear());
      const semester = document.getElementById('createSemester').value;
      const subjects = document.getElementById('createSubjects').value.split(',').map(s => s.trim()).filter(Boolean);

      if (!startDate || !endDate) {
        showToast('⚠️ 날짜를 입력해주세요.');
        return;
      }
      if (!subjects.length) {
        showToast('⚠️ 과목을 1개 이상 입력해주세요.');
        return;
      }

      showToast(`⏳ ${selectedStudentIds.size}명 플래너 생성 중...`);

      const studentList = allStudents.filter(s => selectedStudentIds.has(String(s.student_id)));
      let successCount = 0;
      let failCount = 0;

      for (const student of studentList) {
        try {
          const planStartDate = computePlanStartDate(startDate);
          const weeksData = buildWeeksData(planStartDate, startDate);
          const plannerPayload = {
            student_id: student.student_id,
            student_name: student.name,
            school: student.school || '',
            grade: student.grade || '',
            exam_type: examType,
            exam_start_date: startDate,
            exam_end_date: endDate,
            exam_days: Math.max(1, Math.round((new Date(endDate) - new Date(startDate)) / 86400000) + 1),
            plan_start_date: planStartDate,
            subjects,
            schedule: '{}',
            scope: '',
            status: 'active',
            created_by: sessionStorage.getItem('userId') || 'admin',
            year,
            school_year: year,
            semester,
            weeks_data: weeksData,
            daily_tasks: {}
          };

          const createdPlanner = await createPlannerHeader(plannerPayload);
          const taskRows = createDefaultTaskRows({
            plannerId: createdPlanner.id,
            studentId: student.student_id,
            subjects,
            planStartDate,
            examStartDate: startDate
          });

          if (taskRows.length) {
            await createTaskRowsBulk(taskRows);
          }

          await syncPlannerBridge({
            ...plannerPayload,
            ...createdPlanner,
            id: createdPlanner.id
          }, taskRows);

          successCount++;
        } catch (e) {
          console.error('[batchCreatePlanners]', student.student_id, e);
          failCount++;
        }
      }

      closeModal('createModal');
      await loadPlanners();
      if (successCount > 0 && failCount === 0) {
        showToast(`✅ ${successCount}명 플래너 생성 완료!`);
      } else if (successCount > 0) {
        showToast(`✅ ${successCount}명 완료 / ${failCount}명 실패`);
      } else {
        showToast('⚠️ 플래너 생성 실패');
      }
    }

    async function deletePlanner(id, name) {
      if (!confirm(`${name}의 플래너를 삭제할까요?\n관련 할 일도 모두 삭제됩니다.`)) return;
      try {
        const target = getPlannerFromState(id);
        const taskRows = target ? target.task_rows : await fetchTaskRowsForPlanner('', id);

        await Promise.all((taskRows || []).map(t =>
          t.id ? fetch(`/tables/${TABLE_TASKS}/${t.id}`, { method: 'DELETE' }) : Promise.resolve()
        ));
        await fetch(`/tables/${TABLE_PLANNERS}/${id}`, { method: 'DELETE' });

        await loadPlanners();
        showToast('🗑️ 플래너가 삭제되었습니다.');
      } catch (e) {
        console.error('[deletePlanner]', e);
        showToast('⚠️ 삭제 실패');
      }
    }
  </script>
