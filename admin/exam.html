<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시험 플래너 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* 스크린샷과 동일한 디자인 유지 */
    .stat-card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; flex: 1; }
    .stat-icon { font-size: 24px; margin-bottom: 10px; }
    .stat-value { font-size: 28px; font-weight: 800; color: #163A33; }
    .btn-action { padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; font-size: 12px; margin: 2px; }
    .btn-del { background: #fee2e2; color: #ef4444; }
    .btn-manage { background: #f3f4f6; color: #374151; }
    .search-box { padding: 10px; border: 1.5px solid #ddd; border-radius: 10px; width: 250px; }
  </style>
</head>
<body class="admin-body">
  <div style="padding: 30px;">
    <!-- 상단 대시보드 요약 -->
    <div style="display:flex; gap:20px; margin-bottom:30px;">
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-value" id="totalCount">0</div>
        <div style="color:#6b7280;">전체 플래너</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⌛</div>
        <div class="stat-value" id="ingCount">0</div>
        <div style="color:#6b7280;">진행 중</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚨</div>
        <div class="stat-value" id="urgentCount">0</div>
        <div style="color:#6b7280;">D-7 이내</div>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h2 style="margin:0;">📅 시험 대비 스케줄링</h2>
      <input type="text" id="examSearch" class="search-box" placeholder="학생 검색..." onkeyup="filterTable()">
    </div>

    <table class="admin-table" style="width:100%; border-collapse:collapse; background:#fff; border-radius:15px; overflow:hidden;">
      <thead style="background:#f9fafb;">
        <tr>
          <th style="padding:15px; border-bottom:1px solid #eee;">학생</th>
          <th style="padding:15px; border-bottom:1px solid #eee;">시험 종류</th>
          <th style="padding:15px; border-bottom:1px solid #eee;">기간</th>
          <th style="padding:15px; border-bottom:1px solid #eee;">D-day</th>
          <th style="padding:15px; border-bottom:1px solid #eee;">상태</th>
          <th style="padding:15px; border-bottom:1px solid #eee;">액션</th>
        </tr>
      </thead>
      <tbody id="examTbody"></tbody>
    </table>
  </div>

  <script>
    let allExams = [];

    window.onload = loadExams;

    async function loadExams() {
      try {
        const res = await fetch('/tables/exam_planners');
        const json = await res.json();
        allExams = json.data || [];
        renderTable(allExams);
        updateStats(allExams);
      } catch (e) { console.error("데이터 로딩 실패", e); }
    }

    function renderTable(exams) {
      const tbody = document.getElementById('examTbody');
      const today = new Date();
      today.setHours(0,0,0,0);

      tbody.innerHTML = exams.map(ex => {
        // 날짜 가공 (ISO 형식을 YYYY-MM-DD로)
        const startDate = ex.exam_start_date ? ex.exam_start_date.split('T')[0] : '-';
        
        // D-day 계산
        let dDayText = '완료';
        let dDayClass = '';
        if (ex.exam_start_date) {
          const examDate = new Date(ex.exam_start_date);
          const diff = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
          dDayText = diff > 0 ? `D-${diff}` : (diff === 0 ? "D-Day" : "종료");
        }

        return `
          <tr style="border-bottom:1px solid #eee; text-align:center;">
            <td style="padding:15px; font-weight:bold;">${ex.student_name || '이름 없음'}</td>
            <td>${ex.exam_type || '-'}</td>
            <td style="color:#6b7280;">${startDate}</td>
            <td><span style="background:#f3e8ff; color:#7e22ce; padding:4px 8px; border-radius:5px;">${dDayText}</span></td>
            <td><span style="color:#2563eb;">${ex.status || '진행중'}</span></td>
            <td>
              <button class="btn-action btn-manage" onclick="location.href='plan.html?id=${ex.student_id}'">관리</button>
              <button class="btn-action btn-del" onclick="deleteExam(${ex.id})">삭제</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function updateStats(exams) {
      const today = new Date();
      document.getElementById('totalCount').innerText = exams.length;
      document.getElementById('ingCount').innerText = exams.filter(e => e.status !== '완료').length;
      
      const urgent = exams.filter(e => {
        const diff = Math.ceil((new Date(e.exam_start_date) - today) / (1000 * 60 * 60 * 24));
        return diff >= 0 && diff <= 7;
      }).length;
      document.getElementById('urgentCount').innerText = urgent;
    }

    function filterTable() {
      const term = document.getElementById('examSearch').value.toLowerCase();
      const filtered = allExams.filter(ex => 
        (ex.student_name && ex.student_name.toLowerCase().includes(term)) ||
        (ex.exam_type && ex.exam_type.toLowerCase().includes(term))
      );
      renderTable(filtered);
    }

    async function deleteExam(id) {
      if(!confirm('이 시험 플래너를 정말 삭제하시겠습니까? 관련 플랜은 유지됩니다.')) return;
      try {
        const res = await fetch(`/tables/exam_planners/${id}`, { method: 'DELETE' });
        if(res.ok) { alert('삭제되었습니다.'); loadExams(); }
      } catch (e) { alert('삭제 실패'); }
    }
  </script>
</body>
</html>
