<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>시험 플래너 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .stat-card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; flex: 1; }
    .stat-value { font-size: 28px; font-weight: 800; color: #163A33; }
    .btn-action { padding: 6px 12px; border-radius: 6px; cursor: pointer; border: none; font-size: 12px; }
    .btn-del { background: #fee2e2; color: #ef4444; margin-left: 5px; }
    .search-box { padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; width: 300px; margin-bottom: 20px; }
    .d-day-badge { background: #f3e8ff; color: #7e22ce; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
  </style>
</head>
<body class="admin-body" style="padding: 30px;">
  <div style="display:flex; gap:20px; margin-bottom:30px;">
    <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div>전체 플래너</div></div>
    <div class="stat-card"><div class="stat-value" id="ingCount">0</div><div>진행 중</div></div>
    <div class="stat-card"><div class="stat-value" id="urgentCount">0</div><div>D-7 이내</div></div>
  </div>

  <div style="display:flex; justify-content:space-between;">
    <input type="text" id="examSearch" class="search-box" placeholder="학생 이름 또는 시험 종류 검색..." onkeyup="filterTable()">
    <button onclick="location.href='../student/exam.html'" style="height:45px; padding:0 20px; background:#4f46e5; color:#fff; border:none; border-radius:12px; cursor:pointer;">+ 새 플래너 생성</button>
  </div>

  <table class="admin-table" style="width:100%; border-collapse:collapse; background:#fff; border-radius:15px; overflow:hidden;">
    <thead style="background:#f9fafb;">
      <tr><th>학생</th><th>시험 종류</th><th>기간</th><th>D-day</th><th>상태</th><th>액션</th></tr>
    </thead>
    <tbody id="examTbody" style="text-align:center;"></tbody>
  </table>

  <script>
    let allExams = [];
    window.onload = loadExams;

    async function loadExams() {
      const res = await fetch('/tables/exam_planners');
      const json = await res.json();
      allExams = json.data || [];
      renderTable(allExams);
    }

    function renderTable(exams) {
      const tbody = document.getElementById('examTbody');
      const today = new Date();
      today.setHours(0,0,0,0);

      tbody.innerHTML = exams.map(ex => {
        const examDate = new Date(ex.exam_start_date);
        const diff = Math.ceil((examDate - today) / (86400000));
        const dDay = diff > 0 ? `D-${diff}` : (diff === 0 ? "D-Day" : "종료");

        return `
          <tr style="border-bottom:1px solid #eee;">
            <td style="padding:15px; font-weight:700;">${ex.student_name || '-'}</td>
            <td>${ex.exam_type}</td>
            <td>${ex.exam_start_date ? ex.exam_start_date.split('T')[0] : '-'}</td>
            <td><span class="d-day-badge">${dDay}</span></td>
            <td style="color:#2563eb;">${ex.status}</td>
            <td>
              <button class="btn-action" style="background:#f3f4f6;" onclick="location.href='plan.html?id=${ex.student_id}'">관리</button>
              <button class="btn-action btn-del" onclick="deleteExam(${ex.id})">삭제</button>
            </td>
          </tr>`;
      }).join('');
      document.getElementById('totalCount').innerText = exams.length;
      document.getElementById('ingCount').innerText = exams.filter(e => e.status !== '완료').length;
      document.getElementById('urgentCount').innerText = exams.filter(e => {
        const d = Math.ceil((new Date(e.exam_start_date) - today) / 86400000);
        return d >= 0 && d <= 7;
      }).length;
    }

    function filterTable() {
      const term = document.getElementById('examSearch').value.toLowerCase();
      const filtered = allExams.filter(ex => 
        (ex.student_name && ex.student_name.toLowerCase().includes(term)) ||
        (ex.exam_type && ex.exam_type.toLowerCase().includes(term))
      );
      renderTable(filtered);
    }

    async function deleteExam(id) {
      if(!confirm('정말 삭제하시겠습니까?')) return;
      const res = await fetch(`/tables/exam_planners/${id}`, { method: 'DELETE' });
      if(res.ok) { alert('삭제되었습니다.'); loadExams(); }
      else { alert('삭제 실패!'); }
    }
  </script>
</body>
</html>
