<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시험 플래너 관리 – 다빈치랩</title>
  <link rel="manifest" href="../admin-manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DVL관리자" />
  <link rel="apple-touch-icon" href="../images/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/mobile.css" />
  <style>
    :root {
      --ep-main: #4f46e5; --ep-light: #e0e7ff; --ep-accent: #818cf8;
      --ep-success: #10b981; --ep-warn: #f59e0b; --ep-danger: #ef4444;
    }
    .ep-wrap { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .ep-summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    @media(max-width:900px){ .ep-summary-row { grid-template-columns: repeat(2,1fr); } }
    .ep-sum-card { background: white; border-radius: 14px; padding: 20px 22px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display: flex; align-items: center; gap: 16px; }
    .ep-sum-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .ep-sum-card .sc-val { font-size: 1.8rem; font-weight: 800; color: #1e1b4b; }
    .ep-sum-card .sc-label { font-size: .82rem; color: #6b7280; }
    .ep-actionbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .ep-actionbar h2 { font-size: 1.15rem; font-weight: 700; color: #1e1b4b; }
    .ep-search-wrap { display: flex; gap: 8px; align-items: center; }
    .ep-search-wrap input { padding: 9px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .9rem; width: 220px; }
    .btn-ep-create { background: var(--ep-main); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: .9rem; font-weight: 700; cursor: pointer; }
    .ep-table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
    .ep-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .ep-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-weight: 700; color: #374151; border-bottom: 1.5px solid #e5e7eb; }
    .ep-table td { padding: 13px 16px; border-bottom: 1px solid #f3f4f6; color: #4b5563; }
    .status-badge { font-size: .75rem; padding: 3px 10px; border-radius: 99px; font-weight: 700; }
    .status-badge.ongoing { background: #dbeafe; color: #1d4ed8; }
    .status-badge.done { background: #d1fae5; color: #065f46; }
    .dday-tag { font-size: .78rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; background: #ede9fe; color: #5b21b6; }
    .detail-panel { position: fixed; top: 0; right: -600px; width: 580px; height: 100vh; background: white; box-shadow: -4px 0 24px rgba(0,0,0,.12); z-index: 9000; overflow-y: auto; transition: right .3s; }
    .detail-panel.open { right: 0; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 560px; }
  </style>
</head>
<body class="admin-body">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <!-- ⭐ 로고 링크를 dashboard.html로 수정했습니다 ⭐ -->
      <a href="dashboard.html" class="sidebar-logo">
        <span class="sidebar-logo-icon">◈</span>
        <span class="sidebar-logo-text">DaVinci LaB</span>
      </a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">학생 관리</span>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
        <a href="students.html" class="nav-item"><i class="fas fa-users"></i><span>학생 목록</span></a>
        <a href="attendance.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>출결 관리</span></a>
        <a href="plan.html" class="nav-item"><i class="fas fa-tasks"></i><span>학습 플랜</span></a>
      </div>
      <div class="nav-section">
        <span class="nav-section-label">학습 관리</span>
        <a href="assessment.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>수행평가</span></a>
        <a href="grades.html" class="nav-item"><i class="fas fa-chart-line"></i><span>성적 조회</span></a>
        <a href="record.html" class="nav-item"><i class="fas fa-id-card"></i><span>학생부 열람</span></a>
        <a href="exam.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>시험 플래너</span></a>
      </div>
    </nav>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="admin-main" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb"><span>시험 플래너 관리</span></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-user">
          <div class="topbar-avatar">박</div>
          <span id="topbarAdminName">박소현</span>
        </div>
      </div>
    </header>

    <div class="ep-wrap">
      <!-- 요약 카드 -->
      <div class="ep-summary-row" id="summaryRow">
        <div class="ep-sum-card">
          <div class="ep-sum-icon" style="background:#e0e7ff"><i class="fas fa-calendar-alt" style="color:#4f46e5"></i></div>
          <div><div class="sc-val" id="sumTotal">0</div><div class="sc-label">전체 플래너</div></div>
        </div>
        <div class="ep-sum-card">
          <div class="ep-sum-icon" style="background:#dbeafe"><i class="fas fa-spinner" style="color:#1d4ed8"></i></div>
          <div><div class="sc-val" id="sumOngoing">0</div><div class="sc-label">진행 중</div></div>
        </div>
        <div class="ep-sum-card">
          <div class="ep-sum-icon" style="background:#fee2e2"><i class="fas fa-exclamation-circle" style="color:#ef4444"></i></div>
          <div><div class="sc-val" id="sumUrgent">0</div><div class="sc-label">D-7 이내</div></div>
        </div>
      </div>

      <!-- 액션바 -->
      <div class="ep-actionbar">
        <h2><i class="fas fa-calendar-alt" style="color:#4f46e5;margin-right:8px"></i>시험 대비 스케줄링</h2>
        <div class="ep-search-wrap">
          <input type="text" id="searchInput" placeholder="학생 검색..." oninput="filterPlanners()" />
          <button class="btn-ep-create" onclick="openCreateModal()"><i class="fas fa-magic"></i> 일괄 생성</button>
        </div>
      </div>

      <!-- 플래너 테이블 -->
      <div class="ep-table-wrap">
        <table class="ep-table">
          <thead>
            <tr>
              <th>학생</th>
              <th>시험 종류</th>
              <th>기간</th>
              <th>D-day</th>
              <th>상태</th>
              <th>액션</th>
            </tr>
          </thead>
          <tbody id="plannerTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 생성 모달 (간략화) -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-box">
      <h3>새 시험 플랜 생성</h3>
      <div class="modal-form">
        <label>시험 종류</label>
        <select id="createExamType">
          <option>중간고사</option>
          <option>기말고사</option>
          <option>모의고사</option>
        </select>
        <label>시험 시작일</label>
        <input type="date" id="createStartDate" />
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button onclick="closeModal('createModal')" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:white;">취소</button>
          <button onclick="batchCreatePlanners()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#4f46e5; color:white; font-weight:700;">생성 시작</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/dvl-session.js"></script>
  <script src="../js/admin-common.js"></script>
  <script>
    // ── 데이터 로드 및 초기화 ──
    async function loadPlanners() {
      try {
        const res = await fetch('/tables/exam_planners?limit=100');
        const data = await res.json();
        const planners = data.data || [];
        const tbody = document.getElementById('plannerTableBody');
        
        document.getElementById('sumTotal').textContent = planners.length;
        document.getElementById('sumOngoing').textContent = planners.filter(p => p.status === '진행중').length;

        tbody.innerHTML = planners.map(p => `
          <tr>
            <td><strong>${p.student_name}</strong></td>
            <td>${p.exam_type}</td>
            <td>${p.exam_start_date}</td>
            <td><span class="dday-tag">계산중</span></td>
            <td><span class="status-badge ongoing">${p.status}</span></td>
            <td><button class="btn-ep-action btn-ep-view" onclick="alert('준비중')">관리</button></td>
          </tr>
        `).join('');
      } catch(e) { console.error('플래너 로드 실패'); }
    }

    function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // ── 일괄 생성 및 3회독 로직 (기초) ──
    async function batchCreatePlanners() {
      const type = document.getElementById('createExamType').value;
      const date = document.getElementById('createStartDate').value;
      if(!date) return alert('날짜를 선택하세요');
      
      alert(type + ' 대비 4주(개념-완성-문제-완전학습) 플랜을 생성합니다.');
      closeModal('createModal');
    }

    window.onload = loadPlanners;
  </script>
</body>
</html>
