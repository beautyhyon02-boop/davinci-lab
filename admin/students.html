<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 관리</title>
  <style>
    :root{--bg:#f7f8fc;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--primary:#2563eb;--danger:#dc2626;--ok:#059669}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Pretendard,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px} .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 6px 24px rgba(0,0,0,.04)}
    h1,h2{margin:0 0 16px} .muted{color:var(--muted)} .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:14px;font-weight:700;margin-bottom:6px} input,select,button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);font-size:14px}
    button{cursor:pointer;font-weight:700} .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)} .btn-ghost{background:#fff}
    .status{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:14px;display:none} .status.show{display:block}
    .status.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0} .status.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    table{width:100%;border-collapse:collapse} th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:14px} th{color:var(--muted);font-weight:700}
    .pill{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;background:#eff6ff;color:#1d4ed8}
    .pill.pending{background:#fff7ed;color:#c2410c} .meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px} .meta .card{padding:14px 16px;flex:1}
    .num{font-size:28px;font-weight:800} .actions{display:flex;gap:10px;margin-top:12px}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>학생 관리</h1>
    <p class="muted">학생 등록 안정화용 전체 교체본입니다. API는 <code>/tables/student_profiles</code> 기준으로 동작하며, 현재 DB에 없는 <code>school_name</code> 필드는 전송하지 않도록 수정했습니다.</p>

    <div class="meta">
      <div class="card"><div class="muted">전체 학생</div><div id="countTotal" class="num">0</div></div>
      <div class="card"><div class="muted">활성 학생</div><div id="countActive" class="num">0</div></div>
      <div class="card"><div class="muted">승인 대기</div><div id="countPending" class="num">0</div></div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>학생 등록</h2>
        <form id="studentForm">
          <div class="row">
            <div><label for="student_name">학생 이름</label><input id="student_name" name="student_name" required /></div>
            <div><label for="student_id">학생 아이디</label><input id="student_id" name="student_id" required /></div>
          </div>
          <div class="row">
            <div><label for="password">비밀번호</label><input id="password" name="password" type="password" required /></div>
            <div><label for="year">학년</label>
              <select id="year" name="year" required>
                <option value="">선택</option>
                <option value="중1">중1</option><option value="중2">중2</option><option value="중3">중3</option>
                <option value="고1">고1</option><option value="고2">고2</option><option value="고3">고3</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div><label for="parent_phone">학부모 전화번호</label><input id="parent_phone" name="parent_phone" placeholder="010-0000-0000" /></div>
            <div><label for="notes">메모</label><input id="notes" name="notes" /></div>
          </div>
          <div class="row">
            <div><label for="status">상태</label>
              <select id="status" name="status">
                <option value="pending">pending</option>
                <option value="active">active</option>
              </select>
            </div>
            <div></div>
          </div>
          <div class="actions">
            <button class="btn-primary" type="submit" id="submitBtn">학생 등록</button>
            <button class="btn-ghost" type="button" id="refreshBtn">목록 새로고침</button>
          </div>
          <div id="formStatus" class="status"></div>
        </form>
      </section>

      <section class="card">
        <h2>최근 학생 목록</h2>
        <p class="muted">등록 성공 시 목록이 자동 갱신됩니다.</p>
        <table>
          <thead><tr><th>이름</th><th>아이디</th><th>학년</th><th>상태</th></tr></thead>
          <tbody id="studentRows"><tr><td colspan="4" class="muted">불러오는 중...</td></tr></tbody>
        </table>
      </section>
    </div>
  </div>
  <script src="../js/students.js?v=registration-stable-20260530"></script>
</body>
</html>
