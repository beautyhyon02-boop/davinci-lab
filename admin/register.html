<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 가입 신청 – 다빈치랩</title>
  <link rel="manifest" href="../admin-manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --main:   #163A33;
      --main2:  #1e5045;
      --accent: #34d399;
      --light:  #e8f5f0;
      --border: #d1fae5;
      --text:   #111827;
      --sub:    #6b7280;
      --err:    #ef4444;
      --warn-bg:#fffbeb;
      --warn-border:#fde68a;
      --warn-text:#92400e;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f2922 0%, #163A33 50%, #1a4a3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .reg-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* 헤더 */
    .reg-header {
      background: linear-gradient(135deg, var(--main), var(--main2));
      padding: 32px 32px 24px;
      text-align: center;
    }
    .reg-logo {
      width: 52px; height: 52px;
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 24px; color: var(--accent);
    }
    .reg-header h1 {
      font-size: 20px; font-weight: 700; color: #fff;
      margin-bottom: 6px;
    }
    .reg-header p {
      font-size: 13px; color: rgba(255,255,255,.7);
      line-height: 1.6;
    }

    /* 안내 배너 */
    .reg-notice {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 10px;
      padding: 12px 16px;
      margin: 20px 24px 0;
      font-size: 12.5px;
      color: var(--warn-text);
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.6;
    }
    .reg-notice i { margin-top: 2px; flex-shrink: 0; }

    /* 폼 */
    .reg-body { padding: 20px 24px 28px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12.5px; font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group label .req { color: var(--err); margin-left: 3px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(52,211,153,.15);
      background: #fff;
    }
    .form-input.error { border-color: var(--err); }
    .form-hint {
      font-size: 11.5px; color: var(--sub);
      margin-top: 4px;
    }
    .form-error {
      font-size: 11.5px; color: var(--err);
      margin-top: 4px; display: none;
    }

    /* 비밀번호 강도 */
    .pw-strength-wrap { margin-top: 6px; }
    .pw-strength-bar {
      height: 4px; border-radius: 4px;
      background: #e5e7eb; overflow: hidden;
    }
    .pw-strength-fill {
      height: 100%; width: 0;
      border-radius: 4px;
      transition: width .3s, background .3s;
    }
    .pw-strength-label {
      font-size: 11px; color: var(--sub);
      margin-top: 3px;
    }

    /* 구분선 */
    .form-divider {
      border: none; border-top: 1px solid #f3f4f6;
      margin: 20px 0;
    }

    /* 제출 버튼 */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--main), var(--main2));
      color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn-submit:hover { opacity: .92; }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .reg-login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px; color: var(--sub);
    }
    .reg-login-link a {
      color: var(--main); font-weight: 600;
      text-decoration: none;
    }
    .reg-login-link a:hover { text-decoration: underline; }

    /* 성공 화면 */
    .reg-success {
      display: none;
      padding: 40px 32px;
      text-align: center;
    }
    .reg-success-icon {
      width: 72px; height: 72px;
      background: var(--light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px; color: var(--accent);
    }
    .reg-success h2 { font-size: 20px; color: var(--text); margin-bottom: 10px; }
    .reg-success p { font-size: 13.5px; color: var(--sub); line-height: 1.8; }
    .btn-go-login {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 24px;
      padding: 12px 28px;
      background: var(--main);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: opacity .2s;
    }
    .btn-go-login:hover { opacity: .88; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f2937; color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      transition: transform .3s, opacity .3s;
      opacity: 0; z-index: 9999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="reg-card">
    <!-- 헤더 -->
    <div class="reg-header">
      <div class="reg-logo"><i class="fas fa-user-shield"></i></div>
      <h1>관리자 가입 신청</h1>
      <p>다빈치랩 관리자 계정을 신청합니다.<br>마스터 관리자 승인 후 로그인이 가능합니다.</p>
    </div>

    <!-- 폼 영역 -->
    <div id="regFormArea">
      <div class="reg-notice">
        <i class="fas fa-info-circle"></i>
        <span>가입 신청 후 <strong>박소현 대표</strong>의 승인이 완료되어야 로그인할 수 있습니다. 승인까지 다소 시간이 소요될 수 있습니다.</span>
      </div>

      <div class="reg-body">
        <!-- 아이디 -->
        <div class="form-group">
          <label>로그인 아이디 <span class="req">*</span></label>
          <input class="form-input" id="regAdminId" type="text"
            placeholder="영문+숫자 조합 (예: teacher01)"
            autocomplete="off" autocapitalize="off" spellcheck="false" />
          <div class="form-hint">영문 소문자, 숫자, 언더바(_) 사용 가능 · 4~20자</div>
          <div class="form-error" id="errAdminId"></div>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label>비밀번호 <span class="req">*</span></label>
          <input class="form-input" id="regPw" type="password"
            placeholder="8자 이상, 영문+숫자+특수문자"
            autocomplete="new-password" oninput="checkPwStrength()" />
          <div class="pw-strength-wrap">
            <div class="pw-strength-bar">
              <div class="pw-strength-fill" id="pwFill"></div>
            </div>
            <div class="pw-strength-label" id="pwLabel">비밀번호를 입력하세요</div>
          </div>
          <div class="form-error" id="errPw"></div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label>비밀번호 확인 <span class="req">*</span></label>
          <input class="form-input" id="regPwConfirm" type="password"
            placeholder="비밀번호 재입력"
            autocomplete="new-password" />
          <div class="form-error" id="errPwConfirm"></div>
        </div>

        <hr class="form-divider" />

        <!-- 이름 -->
        <div class="form-group">
          <label>이름 <span class="req">*</span></label>
          <input class="form-input" id="regName" type="text"
            placeholder="홍길동 선생님" />
          <div class="form-error" id="errName"></div>
        </div>

        <!-- 직책 -->
        <div class="form-group">
          <label>직책 / 담당 과목</label>
          <input class="form-input" id="regTitle" type="text"
            placeholder="예: 수학 담당, 수석 컨설턴트" />
        </div>

        <!-- 연락처 -->
        <div class="form-group">
          <label>연락처</label>
          <input class="form-input" id="regPhone" type="tel"
            placeholder="010-0000-0000" />
        </div>

        <!-- 신청 사유 -->
        <div class="form-group">
          <label>가입 신청 사유</label>
          <input class="form-input" id="regMemo" type="text"
            placeholder="간단한 가입 사유를 입력해 주세요." />
        </div>

        <!-- 제출 -->
        <button class="btn-submit" id="btnSubmit" onclick="submitRegister()">
          <i class="fas fa-paper-plane"></i> 가입 신청하기
        </button>

        <div class="reg-login-link">
          이미 승인된 계정이 있으신가요?
          <a href="login.html">로그인</a>
        </div>
      </div>
    </div>

    <!-- 성공 화면 -->
    <div class="reg-success" id="regSuccess">
      <div class="reg-success-icon"><i class="fas fa-check"></i></div>
      <h2>신청이 완료되었습니다!</h2>
      <p>
        <strong id="successName"></strong>님의 관리자 가입 신청이 접수되었습니다.<br><br>
        마스터 관리자(<strong>박소현 대표</strong>)의 승인 후<br>
        로그인이 가능합니다.<br><br>
        승인 여부는 별도로 연락드릴 예정입니다.
      </p>
      <a class="btn-go-login" href="login.html">
        <i class="fas fa-arrow-right"></i> 로그인 페이지로
      </a>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── SHA-256 해시 ── */
    async function sha256(msg) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    /* ── 비밀번호 강도 체크 ── */
    function checkPwStrength() {
      const pw = document.getElementById('regPw').value;
      const fill  = document.getElementById('pwFill');
      const label = document.getElementById('pwLabel');
      if (!pw) { fill.style.width='0'; label.textContent='비밀번호를 입력하세요'; fill.style.background=''; return; }
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Za-z]/.test(pw) && /[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { w:'25%',  bg:'#ef4444', text:'매우 약함' },
        { w:'50%',  bg:'#f97316', text:'약함' },
        { w:'75%',  bg:'#eab308', text:'보통' },
        { w:'100%', bg:'#22c55e', text:'강함' },
      ];
      const lv = levels[Math.min(score-1, 3)] || levels[0];
      fill.style.width = lv.w;
      fill.style.background = lv.bg;
      label.textContent = `비밀번호 강도: ${lv.text}`;
    }

    /* ── 유효성 검사 ── */
    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }
    function clearErrs() {
      ['errAdminId','errPw','errPwConfirm','errName'].forEach(id => showErr(id,''));
      ['regAdminId','regPw','regPwConfirm','regName'].forEach(id => {
        document.getElementById(id)?.classList.remove('error');
      });
    }

    function markErr(inputId, errId, msg) {
      document.getElementById(inputId).classList.add('error');
      showErr(errId, msg);
    }

    /* ── 아이디 중복 확인 ── */
    async function checkDuplicate(adminId) {
      try {
        const res = await fetch(`tables/admin_accounts?search=${encodeURIComponent(adminId)}&limit=10`);
        if (!res.ok) return false;
        const data = await res.json();
        return (data.data || []).some(r => r.admin_id === adminId);
      } catch(e) { return false; }
    }

    /* ── 가입 신청 제출 ── */
    async function submitRegister() {
      clearErrs();
      const adminId  = document.getElementById('regAdminId').value.trim();
      const pw       = document.getElementById('regPw').value;
      const pwConf   = document.getElementById('regPwConfirm').value;
      const name     = document.getElementById('regName').value.trim();
      const title    = document.getElementById('regTitle').value.trim();
      const phone    = document.getElementById('regPhone').value.trim();
      const memo     = document.getElementById('regMemo').value.trim();

      let valid = true;

      // 아이디 검사
      if (!adminId) {
        markErr('regAdminId','errAdminId','아이디를 입력하세요.'); valid = false;
      } else if (!/^[a-z0-9_]{4,20}$/.test(adminId)) {
        markErr('regAdminId','errAdminId','영문 소문자, 숫자, _만 사용 가능 (4~20자)'); valid = false;
      }

      // 비밀번호 검사
      if (!pw) {
        markErr('regPw','errPw','비밀번호를 입력하세요.'); valid = false;
      } else if (pw.length < 8) {
        markErr('regPw','errPw','비밀번호는 8자 이상이어야 합니다.'); valid = false;
      } else if (!/(?=.*[A-Za-z])(?=.*[0-9])/.test(pw)) {
        markErr('regPw','errPw','영문과 숫자를 모두 포함해야 합니다.'); valid = false;
      }

      // 비밀번호 확인
      if (pw && pw !== pwConf) {
        markErr('regPwConfirm','errPwConfirm','비밀번호가 일치하지 않습니다.'); valid = false;
      }

      // 이름 검사
      if (!name) {
        markErr('regName','errName','이름을 입력하세요.'); valid = false;
      }

      if (!valid) return;

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 처리 중...';

      // 아이디 중복 확인
      const isDup = await checkDuplicate(adminId);
      if (isDup) {
        markErr('regAdminId','errAdminId','이미 사용 중인 아이디입니다.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> 가입 신청하기';
        return;
      }

      // 비밀번호 SHA-256 해시
      const pwHash = await sha256(pw);

      // DB에 저장
      try {
        const res = await fetch('tables/admin_accounts', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            admin_id   : adminId,
            pw_hash    : pwHash,
            name       : name,
            title      : title || '',
            phone      : phone || '',
            role       : 'admin',
            status     : 'pending',
            approved_by: '',
            approved_at: '',
            last_login : '',
            memo       : memo || '',
          })
        });
        if (!res.ok) throw new Error('서버 오류');

        // 성공 화면 표시
        document.getElementById('regFormArea').style.display = 'none';
        const suc = document.getElementById('regSuccess');
        suc.style.display = '';
        document.getElementById('successName').textContent = name;

      } catch(e) {
        showToast('⚠️ 신청 중 오류가 발생했습니다. 다시 시도해 주세요.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> 가입 신청하기';
      }
    }

    /* ── Enter 키 제출 ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitRegister();
    });

    /* ── 토스트 ── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
