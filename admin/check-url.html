<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>URL 확인</title>
  <style>
    body { font-family: monospace; padding: 30px; background: #0f172a; color: #e2e8f0; }
    .box { background: #1e293b; border: 2px solid #3b82f6; border-radius: 12px; padding: 20px; margin: 16px 0; }
    .label { color: #94a3b8; font-size: 13px; margin-bottom: 6px; }
    .value { color: #4ade80; font-size: 15px; font-weight: bold; word-break: break-all; }
    .copy-btn { margin-top: 10px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    h2 { color: #60a5fa; }
    .result { margin-top: 8px; font-size: 13px; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
  </style>
</head>
<body>
<h2>🔍 현재 프로젝트 URL 확인</h2>

<div class="box">
  <div class="label">현재 페이지 URL (전체):</div>
  <div class="value" id="fullUrl"></div>
</div>

<div class="box">
  <div class="label">현재 호스트 (origin):</div>
  <div class="value" id="origin"></div>
  <button class="copy-btn" onclick="copyText('origin')">복사</button>
</div>

<div class="box">
  <div class="label">tables API 테스트 결과:</div>
  <div class="result" id="testResult">테스트 중...</div>
</div>

<div class="box">
  <div class="label">✅ vercel.json에 넣을 정확한 URL:</div>
  <div class="value" id="vercelUrl">계산 중...</div>
  <button class="copy-btn" onclick="copyText('vercelUrl')">복사</button>
</div>

<script>
  const origin = location.origin;
  document.getElementById('fullUrl').textContent = location.href;
  document.getElementById('origin').textContent = origin;

  function copyText(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => alert('복사됨: ' + text));
  }

  // tables API 테스트 (상대경로)
  async function test() {
    const resultEl = document.getElementById('testResult');
    const vercelEl = document.getElementById('vercelUrl');

    try {
      const r = await fetch('../tables/student_profiles?limit=1');
      if (r.ok) {
        const d = await r.json();
        resultEl.innerHTML = '<span class="ok">✅ 상대경로 ../tables/ 작동! 데이터: ' + (d.total ?? JSON.stringify(d).substring(0,80)) + '</span>';
        vercelEl.textContent = origin + '/tables → 상대경로로 OK (vercel.json 불필요!)';
      } else {
        resultEl.innerHTML = '<span class="err">❌ 상대경로 실패 (HTTP ' + r.status + ')</span><br>아래 절대 URL을 vercel.json에 사용하세요.';
        vercelEl.textContent = origin + ' → 이 origin 값을 알려주세요!';
      }
    } catch(e) {
      resultEl.innerHTML = '<span class="err">❌ 네트워크 오류: ' + e.message + '</span><br>아래 URL을 알려주세요.';
      vercelEl.textContent = origin + ' → 이 origin 값을 복사해서 알려주세요!';
    }
  }
  test();
</script>
</body>
</html>
