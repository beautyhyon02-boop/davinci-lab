<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>학습 플랜 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8fafc; }
    .admin-container { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #163A33; color: white; padding: 20px; flex-shrink: 0; }
    .stu-btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; text-align: left; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
    .stu-btn.active { background: white; color: #163A33; font-weight: bold; }
    .main-content { flex-grow: 1; padding: 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .plan-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    .plan-table th, .plan-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: center; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 25px; border-radius: 15px; width: 400px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .btn-save { width: 100%; background: #163A33; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="sidebar"><h3>👥 학생 목록</h3><div id="studentList"></div></div>
  <div class="main-content">
    <div class="header"><h1 id="stuName">학생을 선택해주세요</h1><button onclick="openModal()" style="background:#4f46e5; color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">+ 플랜 작성</button></div>
    <table class="plan-table"><thead><tr><th>날짜</th><th>과목</th><th>목표량</th><th>내용</th><th>삭제</th></tr></thead><tbody id="planTbody"></tbody></table>
  </div>
</div>

<!-- 모달 창 -->
<div class="modal" id="planModal"><div class="modal-content">
    <h3>📝 학습 플랜 추가</h3>
    <div class="form-group"><label>날짜</label><input type="date" id="pDate"></div>
    <div class="form-group"><label>과목</label>
      <select id="pSubSelect" onchange="document.getElementById('pSubText').value=this.value">
        <option value="">직접 입력</option><option value="국어">국어</option><option value="수학">수학</option><option value="영어">영어</option><option value="과학">과학</option><option value="사회">사회</option>
      </select>
      <input type="text" id="pSubText" placeholder="과목명 직접 입력" style="margin-top:5px;">
    </div>
    <div class="form-group"><label>목표량</label><input type="text" id="pTarget" placeholder="예: 30문제"></div>
    <div class="form-group"><label>내용</label><textarea id="pContent"></textarea></div>
    <button class="btn-save" onclick="savePlan()">저장하기</button>
    <button onclick="closeModal()" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer; color:#666;">취소</button>
</div></div>

<script>
  let curId = null, curName = "";
  window.onload = () => { document.getElementById('pDate').value = new Date().toISOString().split('T')[0]; loadStus(); };

  async function loadStus() {
    const res = await fetch('/tables/student_profiles');
    const json = await res.json();
    const container = document.getElementById('studentList');
    container.innerHTML = (json.data || []).map(s => `<button class="stu-btn ${curId===s.student_id?'active':''}" onclick="selStu('${s.student_id}', '${s.name}')">${s.name}</button>`).join('');
    if(!curId && json.data.length > 0) selStu(json.data[0].student_id, json.data[0].name);
  }

  function selStu(id, name) { curId = id; curName = name; document.getElementById('stuName').innerText = `${name} 학생`; loadStus(); loadPlans(); }

  async function loadPlans() {
    const res = await fetch(`/tables/planner_tasks?search=${curId}`);
    const json = await res.json();
    const tasks = (json.data || []).filter(t => t.student_id === curId);
    document.getElementById('planTbody').innerHTML = tasks.map(t => `<tr><td>${t.task_date}</td><td>${t.subject}</td><td>${t.target_amount}</td><td>${t.task_content}</td><td><button onclick="delPlan(${t.id})" style="border:none; background:none; color:red; cursor:pointer;">❌</button></td></tr>`).join('');
  }

 async function savePlan() {
    const item = {
      student_id: curId, 
      student_name: curName, 
      task_date: document.getElementById('pDate').value,
      subject: document.getElementById('pSubText').value, 
      target_amount: document.getElementById('pTarget').value,
      task_content: document.getElementById('pContent').value, 
      planner_id: 0, 
      is_done: false
    };

    const res = await fetch('/tables/planner_tasks', { 
        method: 'POST', 
        headers: {'Content-Type':'application/json'}, 
        body: JSON.stringify(item) 
    });

    const result = await res.json(); // 서버에서 보내는 진짜 답변을 읽습니다.

    if(res.ok) { 
      alert('✅ 저장 성공!'); 
      closeModal(); 
      loadPlans(); 
    } else { 
      // 💡 여기서 에러의 '진짜 이유'를 팝업으로 띄워줍니다.
      alert('❌ 저장 실패!\n이유: ' + (result.error || '알 수 없는 에러')); 
    }
}
</body>
</html>
