<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 플랜 & 일일 기록 – 다빈치랩</title>
  <link rel="manifest" href="../admin-manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DVL관리자" />
  <link rel="apple-touch-icon" href="../images/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/plan.css" />
  <style>
    /* 사진 인증 확인용 스타일 추가 */
    .photo-verify-btn { padding: 4px 8px; background: #e0e7ff; color: #4338ca; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    .photo-verify-btn:hover { background: #c7d2fe; }
    .status-tag { padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .status-todo { background: #f3f4f6; color: #6b7280; }
    .status-ing { background: #dbeafe; color: #1d4ed8; }
    .status-done { background: #d1fae5; color: #065f46; }
    .plan-student-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
    .stu-tab { padding: 8px 16px; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .stu-tab.active { background: #163A33; color: #fff; border-color: #163A33; }
  </style>
</head>
<body class="admin-body">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">
        <span class="sidebar-logo-icon">◈</span>
        <span class="sidebar-logo-text">DaVinci LaB</span>
      </a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">메인</span>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
      </div>
      <div class="nav-section">
        <span class="nav-section-label">학생 관리</span>
        <a href="students.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>학생 관리</span></a>
        <a href="attendance.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>출결 관리</span></a>
        <a href="plan.html" class="nav-item active"><i class="fas fa-tasks"></i><span>학습 플랜 관리</span></a>
        <a href="daily.html" class="nav-item"><i class="fas fa-pen-alt"></i><span>일일 학습 기록</span></a>
      </div>
      <!-- ... 기타 메뉴 생략 (원장님 기존 코드와 동일) ... -->
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb"><span>다빈치랩</span><i class="fas fa-chevron-right"></i><span class="active">학습 플랜 관리</span></div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><a href="dashboard.html" style="color:inherit"><i class="fas fa-home"></i></a></button>
      </div>
    </header>

    <div class="admin-content">
      <div class="page-title-row">
        <div>
          <h1 class="page-title">학습 플랜 & 일일 기록</h1>
          <p class="page-subtitle" id="currentDateLabel">현재 주차 학습 계획</p>
        </div>
        <button class="btn-add" id="writePlanBtn" onclick="openPlanModal()"><i class="fas fa-plus"></i> 플랜 작성</button>
      </div>

      <!-- 학생 선택 탭 -->
      <div class="plan-student-tabs" id="planStudentTabs">
        <!-- JS로 학생 목록을 채웁니다 -->
      </div>

      <!-- 완료율 KPI -->
      <div class="plan-kpi-row">
        <div class="plan-kpi"> <span class="plan-kpi-val" id="planKpiTotal">0</span> <span class="plan-kpi-label">전체 과제</span> </div>
        <div class="plan-kpi plan-kpi-done"> <span class="plan-kpi-val" id="planKpiDone">0</span> <span class="plan-kpi-label">완료</span> </div>
        <div class="plan-kpi plan-kpi-rate"> <span class="plan-kpi-val" id="planKpiRate">0%</span> <span class="plan-kpi-label">완료율</span> </div>
      </div>

      <div class="dash-panel full-panel">
        <div class="panel-header">
          <h3><i class="fas fa-tasks"></i> 플랜 상세 목록</h3>
        </div>
        <div class="panel-body">
          <table class="admin-table">
            <thead>
              <tr>
                <th>과목</th>
                <th>학습 내용</th>
                <th>목표량</th>
                <th>상태</th>
                <th>인증샷</th>
                <th>코멘트</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="planTbody">
              <!-- 데이터가 여기에 렌더링됩니다 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 플랜 모달 -->
  <div class="modal-overlay" id="planItemModal">
    <div class="modal">
      <div class="modal-header"><h3>플랜 항목 추가</h3></div>
      <div class="modal-body">
        <div class="form-group"><label>과목</label><select id="piSubject"><option>수학</option><option>영어</option><option>국어</option><option>기타</option></select></div>
        <div class="form-group"><label>목표량</label><input type="text" id="piTarget" placeholder="예: 30문제"></div>
        <div class="form-group"><label>학습 내용</label><textarea id="piContent" rows="3"></textarea></div>
        <div class="form-group"><label>관리자 코멘트</label><input type="text" id="piComment"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-submit" onclick="savePlan()">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentStudentId = null;
    let allTasks = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await loadStudents();
    });

    // 1. 학생 목록 불러오기
    async function loadStudents() {
      const res = await fetch('/tables/student_profiles');
      const data = await res.json();
      const container = document.getElementById('planStudentTabs');
      
      container.innerHTML = data.data.map(s => `
        <button class="stu-tab ${currentStudentId === s.student_id ? 'active' : ''}" 
                onclick="selectStudent('${s.student_id}')">${s.name}</button>
      `).join('');

      if (!currentStudentId && data.data.length > 0) {
        selectStudent(data.data[0].student_id);
      }
    }

    function selectStudent(id) {
      currentStudentId = id;
      loadStudents(); // 탭 활성화 표시용
      loadPlans();
    }

    // 2. 플랜 데이터 불러오기
    async function loadPlans() {
      const res = await fetch(`/tables/planner_tasks?search=${currentStudentId}`);
      const data = await res.json();
      allTasks = data.data.filter(t => t.student_id === currentStudentId);
      renderPlanTable();
    }

    // 3. 테이블 렌더링 (사진 인증 버튼 포함)
    function renderPlanTable() {
      const tbody = document.getElementById('planTbody');
      tbody.innerHTML = allTasks.map(t => `
        <tr>
          <td>${t.subject}</td>
          <td>${t.task_content}</td>
          <td>${t.target_amount || '-'}</td>
          <td><span class="status-tag status-${t.status === 'done' ? 'done' : 'ing'}">${t.status || '진행중'}</span></td>
          <td>
            ${t.image_url ? `<button class="photo-verify-btn" onclick="window.open('${t.image_url}')">📷 보기</button>` : '<span style="color:#ccc">미제출</span>'}
          </td>
          <td>${t.admin_comment || '-'}</td>
          <td><button onclick="deletePlan('${t.id}')" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
        </tr>
      `).join('');

      // KPI 업데이트
      const total = allTasks.length;
      const done = allTasks.filter(t => t.status === 'done').length;
      document.getElementById('planKpiTotal').textContent = total;
      document.getElementById('planKpiDone').textContent = done;
      document.getElementById('planKpiRate').textContent = total ? Math.round((done/total)*100) + '%' : '0%';
    }

    // 4. 플랜 저장 (Railway DB 전송)
    async function savePlan() {
      const item = {
        student_id: currentStudentId,
        subject: document.getElementById('piSubject').value,
        target_amount: document.getElementById('piTarget').value,
        task_content: document.getElementById('piContent').value,
        admin_comment: document.getElementById('piComment').value,
        task_date: new Date().toISOString().split('T')[0],
        status: 'todo'
      };

      await fetch('/tables/planner_tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item)
      });

      closeModal();
      loadPlans();
    }

    async function deletePlan(id) {
      if(!confirm('정말 삭제하시겠습니까?')) return;
      await fetch(`/tables/planner_tasks/${id}`, { method: 'DELETE' });
      loadPlans();
    }

    function openPlanModal() { document.getElementById('planItemModal').classList.add('open'); }
    function closeModal() { document.getElementById('planItemModal').classList.remove('open'); }
  </script>
</body>
</html>
