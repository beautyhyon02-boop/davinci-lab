<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 플랜 & 일일 기록 – 다빈치랩</title>
  <link rel="manifest" href="../admin-manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/plan.css" />
  <style>
    /* 팝업 디자인 복구 및 강화 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: #fff; border-radius: 20px; width: 100%; max-width: 500px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 5px; color: #163A33; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
    .required { color: #ef4444; }
    .stu-tab { padding: 8px 16px; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 10px; cursor: pointer; margin-right: 8px; font-weight: 600; transition: 0.2s; }
    .stu-tab.active { background: #163A33; color: #fff; border-color: #163A33; }
    .photo-verify-btn { padding: 4px 8px; background: #e8f5f0; color: #163A33; border-radius: 6px; font-weight: 700; border: none; cursor: pointer; }
  </style>
</head>
<body class="admin-body">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">◈ DaVinci LaB</a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
        <a href="students.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>학생 관리</span></a>
        <a href="plan.html" class="nav-item active"><i class="fas fa-tasks"></i><span>학습 플랜 관리</span></a>
      </div>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left"><button id="sidebarToggle" style="background:none; border:none; cursor:pointer;"><i class="fas fa-bars"></i></button> <span class="active">학습 플랜 관리</span></div>
      <div class="topbar-right"><a href="dashboard.html"><i class="fas fa-home"></i></a></div>
    </header>

    <div class="admin-content">
      <div class="page-title-row">
        <div>
          <h1 class="page-title">학습 플랜 관리</h1>
          <p class="page-subtitle">학생의 공부 계획을 세워주고 사진 인증을 확인하세요.</p>
        </div>
        <!-- ⭐ 버튼 ID를 확실하게 writePlanBtn으로 고정했습니다 ⭐ -->
        <button class="btn-add" id="writePlanBtn"><i class="fas fa-plus"></i> 플랜 작성</button>
      </div>

      <div id="planStudentTabs" class="plan-student-tabs" style="margin-bottom: 20px;"></div>

      <div class="dash-panel full-panel">
        <div class="panel-body">
          <table class="admin-table">
            <thead>
              <tr><th>날짜</th><th>과목</th><th>목표량</th><th>내용</th><th>상태</th><th>인증샷</th><th>삭제</th></tr>
            </thead>
            <tbody id="planTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 플랜 추가 팝업 -->
  <div class="modal-overlay" id="planItemModal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0;">플랜 항목 추가</h3>
        <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
      </div>
      <div class="form-group"><label>수행 날짜 <span class="required">*</span></label><input type="date" id="piDate"></div>
      <div class="form-group">
        <label>과목 <span class="required">*</span></label>
        <select id="piSubject">
          <option value="">선택</option>
          <option>국어</option><option>영어</option><option>수학</option><option>물리학</option><option>화학</option><option>생명과학</option><option>지구과학</option><option>사회</option><option>한국사</option><option>기타</option>
        </select>
      </div>
      <div class="form-group"><label>목표량</label><input type="text" id="piTarget" placeholder="예: 30문항, 3단원"></div>
      <div class="form-group"><label>학습 내용 <span class="required">*</span></label><textarea id="piContent" rows="3"></textarea></div>
      <div class="form-group"><label>관리자 코멘트</label><input type="text" id="piComment" placeholder="학생에게 전달할 코멘트"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="closeModal()" style="flex:1; padding:12px; border:none; background:#f3f4f6; border-radius:10px; cursor:pointer; font-weight:700;">취소</button>
        <button id="saveBtn" style="flex:2; padding:12px; border:none; background:#163A33; color:#fff; border-radius:10px; cursor:pointer; font-weight:700;">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentStudentId = null;

    // 초기 로딩
    window.addEventListener('DOMContentLoaded', async () => {
      console.log("페이지 로드 완료");
      document.getElementById('piDate').value = new Date().toISOString().split('T')[0];
      
      // 1. 버튼 클릭 이벤트 리스너 (직접 바인딩)
      document.getElementById('writePlanBtn').addEventListener('click', () => {
        console.log("플랜 작성 버튼 클릭됨");
        openPlanModal();
      });

      document.getElementById('saveBtn').addEventListener('click', savePlan);

      await loadStudents();
    });

    async function loadStudents() {
      try {
        const res = await fetch('/tables/student_profiles');
        const data = await res.json();
        const container = document.getElementById('planStudentTabs');
        const students = data.data || [];
        
        container.innerHTML = students.map(s => `
          <button class="stu-tab ${currentStudentId === s.student_id ? 'active' : ''}" 
                  onclick="selectStudent('${s.student_id}')">${s.name}</button>
        `).join('');

        if (!currentStudentId && students.length > 0) selectStudent(students[0].student_id);
      } catch(e) { console.error("학생 목록 로드 실패", e); }
    }

    function selectStudent(id) {
      currentStudentId = id;
      loadStudents();
      loadPlans();
    }

    async function loadPlans() {
      if(!currentStudentId) return;
      try {
        const res = await fetch(`/tables/planner_tasks?search=${currentStudentId}`);
        const data = await res.json();
        const tbody = document.getElementById('planTbody');
        const tasks = (data.data || []).filter(t => t.student_id === currentStudentId);
        
        tbody.innerHTML = tasks.map(t => `
          <tr>
            <td>${t.task_date}</td>
            <td><strong>${t.subject}</strong></td>
            <td>${t.target_amount || '-'}</td>
            <td>${t.task_content}</td>
            <td><span class="status-tag ${t.is_done ? 'status-done' : 'status-todo'}">${t.is_done ? '완료' : '진행중'}</span></td>
            <td>${t.image_url ? `<button class="photo-verify-btn" onclick="window.open('${t.image_url}')">📷 확인</button>` : '-'}</td>
            <td><button onclick="deletePlan('${t.id}')" style="background:none; border:none; color:red; cursor:pointer;">&times;</button></td>
          </tr>
        `).join('');
      } catch(e) { console.error("플랜 로드 실패", e); }
    }

    async function savePlan() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerText = "저장 중...";

      const item = {
        planner_id: 0,
        student_id: currentStudentId,
        task_date: document.getElementById('piDate').value,
        subject: document.getElementById('piSubject').value,
        is_done: false,
        task_content: document.getElementById('piContent').value,
        target_amount: document.getElementById('piTarget').value,
        student_memo: "",
        admin_comment: document.getElementById('piComment').value
      };

      try {
        const res = await fetch('/tables/planner_tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item)
        });
        if (res.ok) {
          alert('✅ 저장되었습니다!');
          closeModal();
          loadPlans();
        } else {
          const err = await res.text();
          alert('저장 실패 (500): 1단계 SQL 실행 여부를 확인하세요.');
          console.error(err);
        }
      } catch(e) { alert('통신 오류'); }
      finally { 
        saveBtn.disabled = false; 
        saveBtn.innerText = "저장";
      }
    }

    function openPlanModal() { document.getElementById('planItemModal').classList.add('open'); }
    function closeModal() { document.getElementById('planItemModal').classList.remove('open'); }
    async function deletePlan(id) { if(confirm('삭제할까요?')) { await fetch(`/tables/planner_tasks/${id}`, {method:'DELETE'}); loadPlans(); } }
  </script>
</body>
</html>
