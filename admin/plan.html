<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 플랜 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/plan.css" />
  <style>
    .photo-verify-btn { padding: 4px 8px; background: #e0e7ff; color: #4338ca; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    .status-tag { padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .status-todo { background: #f3f4f6; color: #6b7280; }
    .status-done { background: #d1fae5; color: #065f46; }
    .stu-tab { padding: 8px 16px; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 10px; cursor: pointer; margin-right: 8px; font-weight: 600; }
    .stu-tab.active { background: #163A33; color: #fff; border-color: #163A33; }
  </style>
</head>
<body class="admin-body">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">◈ DaVinci LaB</a>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
      <a href="students.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>학생 관리</span></a>
      <a href="plan.html" class="nav-item active"><i class="fas fa-tasks"></i><span>학습 플랜 관리</span></a>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left"><span class="active">학습 플랜 관리</span></div>
      <div class="topbar-right"><a href="dashboard.html"><i class="fas fa-home"></i></a></div>
    </header>

    <div class="admin-content">
      <div class="page-title-row">
        <h1>학습 플랜 관리</h1>
        <button class="btn-add" onclick="openPlanModal()"><i class="fas fa-plus"></i> 플랜 작성</button>
      </div>

      <div id="planStudentTabs" style="margin-bottom: 20px;"></div>

      <div class="dash-panel full-panel">
        <div class="panel-body">
          <table class="admin-table">
            <thead>
              <tr><th>날짜</th><th>과목</th><th>목표량</th><th>내용</th><th>상태</th><th>인증샷</th><th>삭제</th></tr>
            </thead>
            <tbody id="planTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 플랜 모달 -->
  <div class="modal-overlay" id="planItemModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div class="modal" style="background:#fff; padding:30px; border-radius:15px; width:500px;">
      <h3>플랜 항목 추가</h3>
      <div style="display:grid; gap:15px; margin-top:20px;">
        <input type="date" id="piDate">
        <select id="piSubject">
          <option value="">과목 선택</option>
          <option>국어</option><option>영어</option><option>수학</option><option>과학</option><option>사회</option>
        </select>
        <input type="text" id="piTarget" placeholder="목표량 (예: 30문항)">
        <textarea id="piContent" placeholder="학습 내용" rows="3"></textarea>
        <input type="text" id="piComment" placeholder="관리자 코멘트">
      </div>
      <div style="margin-top:20px; text-align:right;">
        <button onclick="closeModal()" style="padding:10px 20px; border:none; background:#eee; border-radius:8px; cursor:pointer;">취소</button>
        <button id="saveBtn" onclick="savePlan()" style="padding:10px 20px; border:none; background:#163A33; color:#fff; border-radius:8px; cursor:pointer;">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentStudentId = null;
    let currentStudentName = "";

    window.onload = async () => {
      document.getElementById('piDate').value = new Date().toISOString().split('T')[0];
      await loadStudents();
    };

    async function loadStudents() {
      const res = await fetch('/tables/student_profiles');
      const data = await res.json();
      const container = document.getElementById('planStudentTabs');
      container.innerHTML = data.data.map(s => `
        <button class="stu-tab ${currentStudentId === s.student_id ? 'active' : ''}" 
                onclick="selectStudent('${s.student_id}', '${s.name}')">${s.name}</button>
      `).join('');
      if (!currentStudentId && data.data.length > 0) selectStudent(data.data[0].student_id, data.data[0].name);
    }

    function selectStudent(id, name) {
      currentStudentId = id; currentStudentName = name;
      loadStudents(); loadPlans();
    }

    async function loadPlans() {
      const res = await fetch(`/tables/planner_tasks?search=${currentStudentId}`);
      const data = await res.json();
      const tbody = document.getElementById('planTbody');
      const tasks = data.data.filter(t => t.student_id === currentStudentId);
      tbody.innerHTML = tasks.map(t => `
        <tr>
          <td>${t.task_date}</td>
          <td>${t.subject}</td>
          <td>${t.target_amount || '-'}</td>
          <td>${t.task_content}</td>
          <td><span class="status-tag ${t.is_done ? 'status-done' : 'status-todo'}">${t.is_done ? '완료' : '진행중'}</span></td>
          <td>${t.image_url ? '<button class="photo-verify-btn">📷 확인</button>' : '-'}</td>
          <td><button onclick="deletePlan('${t.id}')">❌</button></td>
        </tr>
      `).join('');
    }

    async function savePlan() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      
      // 💡 로그에 찍힌 DB 규격(9개 항목)을 정확히 맞춤
      const item = {
        planner_id: 0,
        student_id: currentStudentId,
        task_date: document.getElementById('piDate').value,
        subject: document.getElementById('piSubject').value,
        is_done: false,
        task_content: document.getElementById('piContent').value,
        target_amount: document.getElementById('piTarget').value,
        student_memo: "",
        admin_comment: document.getElementById('piComment').value
      };

      try {
        const res = await fetch('/tables/planner_tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item)
        });
        if (res.ok) {
          alert('✅ 저장되었습니다!');
          closeModal();
          loadPlans();
        } else {
          alert('저장 실패 (500): DB 설정을 먼저 확인하세요.');
        }
      } catch(e) { alert('통신 오류'); }
      finally { saveBtn.disabled = false; }
    }

    function openPlanModal() { document.getElementById('planItemModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('planItemModal').style.display = 'none'; }
    async function deletePlan(id) { if(confirm('삭제할까요?')) { await fetch(`/tables/planner_tasks/${id}`, {method:'DELETE'}); loadPlans(); } }
  </script>
</body>
</html>
