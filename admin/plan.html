<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>학습 플랜 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body" style="padding:20px;">
  <h1>학습 플랜 관리</h1>
  <div id="studentTabs" style="margin: 20px 0; display: flex; gap: 10px;"></div>
  <table border="1" style="width:100%; border-collapse: collapse;">
    <thead><tr style="background:#eee;"><th>날짜</th><th>과목</th><th>내용</th><th>삭제</th></tr></thead>
    <tbody id="planTbody"></tbody>
  </table>

  <script>
    let curId = null;
    window.onload = loadStus;

    async function loadStus() {
      const res = await fetch('/tables/student_profiles');
      const json = await res.json();
      const container = document.getElementById('studentTabs');
      container.innerHTML = (json.data || []).map(s => `
        <button onclick="selStu('${s.student_id}')" style="padding:10px; cursor:pointer; background:${curId===s.student_id?'#163A33':'#fff'}; color:${curId===s.student_id?'#fff':'#000'}">
          ${s.name}
        </button>`).join('');
      if(!curId && json.data.length > 0) selStu(json.data[0].student_id);
    }

    function selStu(id) { curId = id; loadStus(); loadPlans(); }

    async function loadPlans() {
      const res = await fetch(`/tables/planner_tasks?search=${curId}`);
      const json = await res.json();
      document.getElementById('planTbody').innerHTML = (json.data || []).map(t => `
        <tr><td>${t.task_date}</td><td>${t.subject}</td><td>${t.task_content}</td>
        <td><button onclick="delPlan(${t.id})">❌</button></td></tr>`).join('');
    }

    async function delPlan(id) { if(confirm('삭제?')) { await fetch(`/tables/planner_tasks/${id}`, {method:'DELETE'}); loadPlans(); } }
  </script>
</body>
</html>
