<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 플랜 & 일일 기록 – 다빈치랩</title>
  <link rel="manifest" href="../admin-manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DVL관리자" />
  <link rel="apple-touch-icon" href="../images/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="../images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/plan.css" />
  <style>
    .photo-verify-btn { padding: 4px 8px; background: #e0e7ff; color: #4338ca; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    .status-tag { padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
    .status-todo { background: #f3f4f6; color: #6b7280; }
    .status-ing { background: #dbeafe; color: #1d4ed8; }
    .status-done { background: #d1fae5; color: #065f46; }
    .plan-student-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .stu-tab { padding: 8px 16px; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .stu-tab.active { background: #163A33; color: #fff; border-color: #163A33; }
    .required { color: red; margin-left: 2px; }
  </style>
</head>
<body class="admin-body">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-logo">
        <span class="sidebar-logo-icon">◈</span>
        <span class="sidebar-logo-text">DaVinci LaB</span>
      </a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">메인</span>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
      </div>
      <div class="nav-section">
        <span class="nav-section-label">학생 관리</span>
        <a href="students.html" class="nav-item"><i class="fas fa-user-graduate"></i><span>학생 관리</span></a>
        <a href="attendance.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>출결 관리</span></a>
        <a href="plan.html" class="nav-item active"><i class="fas fa-tasks"></i><span>학습 플랜 관리</span></a>
        <a href="daily.html" class="nav-item"><i class="fas fa-pen-alt"></i><span>일일 학습 기록</span></a>
      </div>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb"><span>다빈치랩</span><i class="fas fa-chevron-right"></i><span class="active">학습 플랜 관리</span></div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><a href="dashboard.html" style="color:inherit"><i class="fas fa-home"></i></a></button>
      </div>
    </header>

    <div class="admin-content">
      <div class="page-title-row">
        <div>
          <h1 class="page-title">학습 플랜 관리</h1>
          <p class="page-subtitle">학생별 주간 계획 수립 및 사진 인증을 관리합니다.</p>
        </div>
        <button class="btn-add" id="writePlanBtn" onclick="openPlanModal()"><i class="fas fa-plus"></i> 플랜 작성</button>
      </div>

      <div class="plan-student-tabs" id="planStudentTabs"></div>

      <div class="plan-kpi-row">
        <div class="plan-kpi"> <span class="plan-kpi-val" id="planKpiTotal">0</span> <span class="plan-kpi-label">전체 과제</span> </div>
        <div class="plan-kpi plan-kpi-done"> <span class="plan-kpi-val" id="planKpiDone">0</span> <span class="plan-kpi-label">완료</span> </div>
        <div class="plan-kpi plan-kpi-rate"> <span class="plan-kpi-val" id="planKpiRate">0%</span> <span class="plan-kpi-label">완료율</span> </div>
      </div>

      <div class="dash-panel full-panel">
        <div class="panel-header"><h3><i class="fas fa-tasks"></i> 플랜 상세 목록</h3></div>
        <div class="panel-body">
          <table class="admin-table">
            <thead>
              <tr>
                <th>수행 날짜</th>
                <th>과목</th>
                <th>학습 내용</th>
                <th>상태</th>
                <th>인증샷</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="planTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 플랜 항목 추가 모달 -->
  <div class="modal-overlay" id="planItemModal">
    <div class="modal">
      <div class="modal-header"><h3>플랜 항목 추가</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="add-form-grid">
          <div class="form-group"><label>수행 날짜 <span class="required">*</span></label><input type="date" id="piDate"></div>
          <div class="form-group">
            <label>과목 <span class="required">*</span></label>
            <select id="piSubject">
              <option value="">선택</option>
              <option>수학</option><option>영어</option><option>국어</option>
              <option>물리학</option><option>화학</option><option>생명과학</option>
              <option>지구과학</option><option>사회</option><option>한국사</option><option>기타</option>
            </select>
          </div>
          <div class="form-group"><label>목표량</label><input type="text" id="piTarget" placeholder="예: 30문항, 3단원"></div>
          <div class="form-group" style="grid-column:1/-1;"><label>학습 내용 <span class="required">*</span></label><textarea id="piContent" rows="3"></textarea></div>
          <div class="form-group">
            <label>진행 상태</label>
            <select id="piStatus"><option value="todo">미완료</option><option value="ing">진행 중</option><option value="done">완료</option></select>
          </div>
          <div class="form-group"><label>관리자 코멘트</label><input type="text" id="piComment"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button id="saveBtn" class="btn-submit" onclick="savePlan()">저장</button>
      </div>
    </div>
  </div>

  <script>
    let currentStudentId = null;
    let allTasks = [];

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('piDate').value = new Date().toISOString().split('T')[0];
      await loadStudents();
    });

    async function loadStudents() {
      try {
        const res = await fetch('/tables/student_profiles');
        const data = await res.json();
        const container = document.getElementById('planStudentTabs');
        const students = (data.data || []).filter(s => s.status !== 'inactive');
        
        container.innerHTML = students.map(s => `
          <button class="stu-tab ${currentStudentId === s.student_id ? 'active' : ''}" 
                  onclick="selectStudent('${s.student_id}')">${s.name}</button>
        `).join('');

        if (!currentStudentId && students.length > 0) selectStudent(students[0].student_id);
      } catch(e) { console.error('학생 목록 로드 실패'); }
    }

    function selectStudent(id) {
      currentStudentId = id;
      loadStudents();
      loadPlans();
    }

    async function loadPlans() {
      if(!currentStudentId) return;
      try {
        const res = await fetch(`/tables/planner_tasks?search=${currentStudentId}&limit=100`);
        const data = await res.json();
        allTasks = (data.data || []).filter(t => t.student_id === currentStudentId)
                                     .sort((a,b) => b.task_date.localeCompare(a.task_date));
        renderPlanTable();
      } catch(e) { console.error('플랜 로드 실패'); }
    }

    function renderPlanTable() {
      const tbody = document.getElementById('planTbody');
      tbody.innerHTML = allTasks.map(t => `
        <tr>
          <td>${t.task_date}</td>
          <td><strong>${t.subject}</strong></td>
          <td>${t.task_content}</td>
          <td><span class="status-tag status-${t.is_done ? 'done' : 'ing'}">${t.is_done ? '완료' : '진행중'}</span></td>
          <td>${t.image_url ? `<button class="photo-verify-btn" onclick="window.open('${t.image_url}')">📷 확인</button>` : '<span style="color:#ccc">미제출</span>'}</td>
          <td><button onclick="deletePlan('${t.id}')" style="color:#ef4444; border:none; background:none; cursor:pointer;"><i class="fas fa-trash-alt"></i></button></td>
        </tr>
      `).join('');

      const total = allTasks.length;
      const done = allTasks.filter(t => t.is_done).length;
      document.getElementById('planKpiTotal').textContent = total;
      document.getElementById('planKpiDone').textContent = done;
      document.getElementById('planKpiRate').textContent = total ? Math.round((done/total)*100) + '%' : '0%';
    }

    async function savePlan() {
      const date = document.getElementById('piDate').value;
      const subject = document.getElementById('piSubject').value;
      const target = document.getElementById('piTarget').value;
      const content = document.getElementById('piContent').value;
      const saveBtn = document.getElementById('saveBtn');

      if(!currentStudentId) return alert('학생을 선택해주세요.');
      if(!date || !subject || !content) return alert('필수 항목을 입력해주세요.');

      saveBtn.disabled = true;
      saveBtn.innerText = "저장 중...";

      try {
        // 1. 해당 학생의 '기본 플래너'가 있는지 확인
        const plannerRes = await fetch(`/tables/exam_planners?search=${currentStudentId}`);
        const plannerData = await plannerRes.json();
        let validPlannerId = (plannerData.data && plannerData.data.length > 0) ? plannerData.data[0].id : null;

        // 2. 만약 플래너가 없다면, 즉석에서 '기본 플래너'를 생성 (500 에러 근본 해결)
        if (!validPlannerId) {
            const createPlannerRes = await fetch('/tables/exam_planners', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: currentStudentId,
                    student_name: document.querySelector('.stu-tab.active')?.innerText || '학생',
                    exam_type: '일반학습',
                    exam_start_date: date,
                    exam_end_date: date,
                    status: '진행중',
                    year: '2026',
                    semester: '1학기'
                })
            });
            const newPlanner = await createPlannerRes.json();
            validPlannerId = newPlanner.id;
        }

        // 3. 이제 유효한 planner_id를 가지고 할 일(Task)을 저장
        const item = {
          planner_id: validPlannerId,
          student_id: currentStudentId,
          task_date: date,
          subject: subject,
          is_done: document.getElementById('piStatus').value === 'done',
          task_content: target ? `[목표:${target}] ${content}` : content,
          student_memo: "",
          admin_comment: document.getElementById('piComment').value || "",
          created_at: new Date().toISOString()
        };

        const res = await fetch('/tables/planner_tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(item)
        });

        if(res.ok) {
          alert('✅ 저장이 완료되었습니다!');
          closeModal();
          await loadPlans();
        } else {
          alert('저장 실패: ' + res.status);
        }
      } catch(e) { 
        alert('서버 통신 오류'); 
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = "저장";
      }
    }

    async function deletePlan(id) {
      if(!confirm('삭제하시겠습니까?')) return;
      await fetch(`/tables/planner_tasks/${id}`, { method: 'DELETE' });
      loadPlans();
    }

    function openPlanModal() { document.getElementById('planItemModal').classList.add('open'); }
    function closeModal() { document.getElementById('planItemModal').classList.remove('open'); }
  </script>
</body>
</html>
