<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학습 플랜 관리 – 다빈치랩</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background: #f8fafc; }
    .sidebar { width: 220px; background: #163A33; color: white; padding: 20px; overflow-y: auto; }
    .stu-btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; text-align: left; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
    .stu-btn.active { background: white; color: #163A33; font-weight: bold; }
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .table th, .table td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: center; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="sidebar"><h3>👥 학생 목록</h3><div id="studentList"></div></div>
  <div class="main">
    <div class="header"><h1 id="stuTitle">학생을 선택해주세요</h1><button onclick="openModal()" style="background:#4f46e5; color:white; padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-weight:600;">+ 플랜 작성</button></div>
    <table class="table"><thead><tr style="background:#f9fafb;"><th>날짜</th><th>과목</th><th>목표량</th><th>내용</th><th>관리</th></tr></thead><tbody id="planTbody"></tbody></table>
  </div>

  <div class="modal" id="pModal"><div class="modal-content">
      <h3>📝 새 학습 플랜</h3>
      <div class="form-group"><label>날짜</label><input type="date" id="pDate"></div>
      <div class="form-group"><label>과목</label><input type="text" id="pSub" placeholder="국어, 수학 등"></div>
      <div class="form-group"><label>목표량</label><input type="text" id="pTarget" placeholder="예: 30문제"></div>
      <div class="form-group"><label>상세 내용</label><textarea id="pContent" rows="3"></textarea></div>
      <button onclick="savePlan()" style="width:100%; padding:12px; background:#163A33; color:white; border:none; border-radius:8px; cursor:pointer;">저장하기</button>
      <button onclick="closeModal()" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer; color:#64748b;">취소</button>
  </div></div>

  <script>
    let curId = null, curName = "";
    window.onload = () => { document.getElementById('pDate').value = new Date().toISOString().slice(0,10); loadStus(); };

    async function loadStus() {
      const res = await fetch('/tables/student_profiles');
      const json = await res.json();
      const list = document.getElementById('studentList');
      list.innerHTML = (json.data || []).map(s => `<button class="stu-btn ${curId===s.student_id?'active':''}" onclick="selStu('${s.student_id}','${s.name}')">${s.name}</button>`).join('');
      if(!curId && json.data.length > 0) selStu(json.data[0].student_id, json.data[0].name);
    }

    function selStu(id, name) { curId = id; curName = name; document.getElementById('stuTitle').innerText = name + " 학생 플랜"; loadStus(); loadPlans(); }

    async function loadPlans() {
      const res = await fetch(`/tables/planner_tasks?search=${curId}`);
      const json = await res.json();
      const tasks = (json.data || []).filter(t => t.student_id === curId);
      document.getElementById('planTbody').innerHTML = tasks.length ? tasks.map(t => `<tr><td>${t.task_date}</td><td>${t.subject}</td><td>${t.target_amount}</td><td>${t.task_content}</td><td><button onclick="delPlan(${t.id})" style="color:red; border:none; background:none; cursor:pointer;">삭제</button></td></tr>`).join('') : '<tr><td colspan="5">등록된 플랜이 없습니다.</td></tr>';
    }

    async function savePlan() {
      const data = { student_id: curId, student_name: curName, task_date: document.getElementById('pDate').value, subject: document.getElementById('pSub').value, target_amount: document.getElementById('pTarget').value, task_content: document.getElementById('pContent').value, is_done: false };
      const res = await fetch('/tables/planner_tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      if(res.ok) { closeModal(); loadPlans(); } else { const err = await res.json(); alert("실패 원인: " + err.error); }
    }

    function openModal() { document.getElementById('pModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('pModal').style.display = 'none'; }
    async function delPlan(id) { if(confirm('삭제하시겠습니까?')) { await fetch(`/tables/planner_tasks/${id}`, {method:'DELETE'}); loadPlans(); } }
  </script>
</body>
</html>
