<!-- student/exam.html 전체 복사 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시험 플래너 생성 – 다빈치랩</title>
  <link rel="stylesheet" href="../css/student.css">
</head>
<body class="student-body">
  <div style="max-width:500px; margin:50px auto; padding:30px; background:#fff; border-radius:20px; shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="text-align:center;">◈ 시험 플래너 생성</h2>
    <div style="margin-top:20px;">
      <label style="display:block; font-weight:bold; margin-bottom:5px;">시험 종류</label>
      <input type="text" id="examType" value="기말고사" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
      
      <label style="display:block; font-weight:bold; margin-bottom:5px;">시험 시작일</label>
      <input type="date" id="startDate" value="2026-07-01" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
      
      <button id="generateBtn" style="width:100%; padding:15px; background:#4f46e5; color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">플래너 자동 생성!</button>
    </div>
  </div>

  <script>
    document.getElementById('generateBtn').addEventListener('click', async () => {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.innerText = "생성 중...";

      // 💡 서버 로그(14개 항목) 규격에 완벽히 맞춘 데이터 구성
      const plannerData = {
        student_id: localStorage.getItem('student_id') || 'park_si_yu',
        student_name: "박시유",
        exam_type: document.getElementById('examType').value,
        exam_start_date: document.getElementById('startDate').value,
        exam_end_date: document.getElementById('startDate').value, // 임시 종료일
        exam_days: "4",
        plan_start_date: new Date().toISOString().split('T')[0],
        subjects: JSON.stringify(["국어", "영어", "수학"]), // JSON 형식 에러 방지 처리
        schedule: "{}",
        scope: "{}",
        status: "진행중",
        created_by: "student",
        year: "2026",
        semester: "1학기"
      };

      try {
        const res = await fetch('/tables/exam_planners', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(plannerData)
        });

        if (res.ok) {
          alert('✅ 플래너 생성 성공! 이제 학습 플랜 이용이 가능합니다.');
          location.href = 'plan.html';
        } else {
          const errText = await res.text();
          alert('❌ 생성 실패: ' + errText);
        }
      } catch (e) {
        alert('네트워크 오류');
      } finally {
        btn.disabled = false;
        btn.innerText = "플래너 자동 생성!";
      }
    });
  </script>
</body>
</html>
