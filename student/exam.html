<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시험 플래너 – 다빈치랩</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/student.css">
  <style>
    .planner-card { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #163A33; }
    .form-control { width: 100%; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-family: inherit; }
    .btn-generate { width: 100%; padding: 15px; background: #4f46e5; color: #fff; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
    .btn-generate:hover { background: #4338ca; transform: translateY(-2px); }
  </style>
</head>
<body class="student-body">
  <div class="main-content">
    <div class="planner-card">
      <h2 style="text-align:center; margin-bottom:25px;">◈ 시험 맞춤 플래너 생성</h2>
      
      <div class="form-group">
        <label>시험 종류</label>
        <select id="examType" class="form-control">
          <option>기말고사 (4일)</option>
          <option>중간고사 (4일)</option>
          <option>모의고사</option>
        </select>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="form-group"><label>시험 시작일</label><input type="date" id="startDate" class="form-control" value="2026-07-01"></div>
        <div class="form-group"><label>시험 종료일</label><input type="date" id="endDate" class="form-control" value="2026-07-04"></div>
      </div>

      <button class="btn-generate" id="generateBtn"><i class="fas fa-magic"></i> 플래너 자동 생성!</button>
    </div>
  </div>

  <script>
    // 세션에서 학생 정보 가져오기 (실제로는 로그인된 학생 ID 사용)
    const studentId = localStorage.getItem('student_id') || 'park_si_yu'; 
    const studentName = "박시유";

    document.getElementById('generateBtn').addEventListener('click', async () => {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.innerText = "서버 연결 중...";

      const plannerData = {
        student_id: studentId,
        student_name: studentName,
        exam_type: document.getElementById('examType').value,
        exam_start_date: document.getElementById('startDate').value,
        exam_end_date: document.getElementById('endDate').value,
        status: '진행중',
        year: '2026',
        semester: '1학기'
      };

      try {
        const res = await fetch('/tables/exam_planners', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(plannerData)
        });

        if (res.ok) {
          alert('✅ 시험 플래너가 생성되었습니다! 이제 학습 플랜 작성이 가능합니다.');
          location.href = 'plan.html'; // 생성 후 학습 플랜 페이지로 이동
        } else {
          alert('❌ 서버 연결 실패: DB 설정을 확인해주세요.');
        }
      } catch (e) {
        alert('네트워크 오류가 발생했습니다.');
      } finally {
        btn.disabled = false;
        btn.innerText = "플래너 자동 생성!";
      }
    });
  </script>
</body>
</html>
