<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>시험 플래너 생성 – 다빈치랩</title>
  <link rel="stylesheet" href="../css/student.css">
  <style>
    .planner-card { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: 50px auto; }
    .form-group { margin-bottom: 20px; }
    .form-control { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; box-sizing: border-box; }
    .btn-gen { width: 100%; padding: 15px; background: #4f46e5; color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body class="student-body">
  <div class="planner-card">
    <h2 style="text-align:center;">◈ 시험 맞춤 플래너 생성</h2>
    <div class="form-group"><label>시험 종류</label><select id="examType" class="form-control"><option>기말고사</option><option>중간고사</option></select></div>
    <div class="form-group"><label>시험 시작일</label><input type="date" id="startDate" class="form-control"></div>
    <div class="form-group"><label>시험 종료일</label><input type="date" id="endDate" class="form-control"></div>
    <div class="form-group"><label>과목 (쉼표 구분)</label><input id="subjects" class="form-control" value="국어, 수학, 영어"></div>
    <button class="btn-gen" id="genBtn">플래너 자동 생성!</button>
  </div>
  <script>
    const studentId = localStorage.getItem('student_id') || 'park_si_yu';
    document.getElementById('genBtn').onclick = async () => {
      const btn = document.getElementById('genBtn');
      btn.disabled = true; btn.innerText = "생성 중...";
      const subArr = document.getElementById('subjects').value.split(',').map(s => s.trim());
      
      try {
        const pRes = await fetch('/tables/exam_planners', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            student_id: studentId, exam_type: document.getElementById('examType').value,
            exam_start_date: document.getElementById('startDate').value, subjects: subArr.join(', '), status: '진행중'
          })
        });
        const pData = await pRes.json();
        
        for (let i = 0; i < 5; i++) {
          await fetch('/tables/planner_tasks', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              planner_id: pData.data.id, student_id: studentId,
              task_date: new Date(Date.now() + i*86400000).toISOString().slice(0,10),
              subject: subArr[i % subArr.length], task_content: '개념 정리 및 문제 풀이'
            })
          });
        }
        alert('✅ 생성 성공!'); location.href = 'plan.html';
      } catch (e) { alert('오류 발생'); } finally { btn.disabled = false; btn.innerText = "플래너 자동 생성!"; }
    };
  </script>
</body>
</html>
