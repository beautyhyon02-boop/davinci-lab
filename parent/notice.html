<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 – 다빈치랩 학부모</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/mobile.css" />
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#163A33" />
  <style>
    :root { --nc-main: #4f46e5; --nc-light: #e0e7ff; }
    .nc-wrap { padding: 24px; max-width: 860px; margin: 0 auto; }
    .nc-list { display: flex; flex-direction: column; gap: 10px; }
    .nc-card { background: white; border-radius: 14px; padding: 18px 22px; box-shadow: 0 2px 8px rgba(0,0,0,.05); border: 1.5px solid transparent; cursor: pointer; transition: all .2s; }
    .nc-card:hover { border-color: var(--nc-light); transform: translateY(-1px); }
    .nc-card.pinned { border-color: #fde68a; background: #fffbeb; }
    .nc-card.important { border-left: 4px solid #ef4444; }
    .nc-card.unread .nc-title { font-weight: 800; }
    .nc-badges { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .nc-badge { font-size: .72rem; padding: 2px 9px; border-radius: 99px; font-weight: 700; }
    .cat-exam { background: #fee2e2; color: #991b1b; }
    .cat-event { background: #dbeafe; color: #1d4ed8; }
    .cat-parent { background: #fce7f3; color: #9d174d; }
    .cat-general { background: #f3f4f6; color: #374151; }
    .pin-tag { background: #fef3c7; color: #92400e; }
    .imp-tag { background: #fee2e2; color: #991b1b; }
    .new-tag { background: #ede9fe; color: #5b21b6; }
    .nc-title { font-size: .98rem; font-weight: 600; color: #1e1b4b; margin-bottom: 6px; }
    .nc-meta { font-size: .78rem; color: #9ca3af; display: flex; gap: 10px; flex-wrap: wrap; }
    .nc-preview { font-size: .85rem; color: #6b7280; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #9ca3af; }
    .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .detail-title { font-size: 1.2rem; font-weight: 800; color: #1e1b4b; margin-bottom: 8px; }
    .detail-meta { font-size: .82rem; color: #9ca3af; display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f3f4f6; }
    .detail-content { font-size: .95rem; color: #374151; line-height: 1.9; white-space: pre-line; }
    .nc-filter-tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .nc-tab { padding: 6px 14px; border-radius: 20px; font-size: .82rem; font-weight: 600; cursor: pointer; border: 1.5px solid #e5e7eb; background: white; color: #6b7280; transition: all .2s; }
    .nc-tab.active { background: var(--nc-main); color: white; border-color: var(--nc-main); }
    .nc-empty { text-align: center; padding: 60px; color: #9ca3af; }
    .nc-empty i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  </style>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo">
        <span class="sidebar-logo-icon">◈</span>
        <span class="sidebar-logo-text">DaVinci LaB</span>
      </a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="student-sidebar-profile">
      <div class="stu-avatar-wrap">
        <div class="stu-avatar" id="sidebarAvatar">부</div>
      </div>
      <div class="stu-profile-info">
        <strong id="sidebarParentName">학부모</strong>
        <span id="sidebarChildName">자녀: –</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">자녀 현황</span>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>대시보드</span></a>
        <a href="grades.html" class="nav-item"><i class="fas fa-chart-line"></i><span>성적 현황</span></a>
        <a href="exam.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>시험 플래너</span></a>
        <a href="consult.html" class="nav-item"><i class="fas fa-comments"></i><span>상담 내역</span></a>
        <a href="notice.html" class="nav-item active"><i class="fas fa-bullhorn"></i><span>공지사항</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>로그아웃</span></a>
    </div>
  </aside>
  <div class="sidebar-dim" id="sidebarDim"></div>

  <div class="admin-main" id="mainContent">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb"><span>공지사항</span></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-user">
          <div class="topbar-avatar" id="topbarAvatar">부</div>
          <span id="topbarName">학부모</span>
        </div>
      </div>
    </header>

    <div class="nc-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <h2 style="font-size:1.1rem;font-weight:700;color:#1e1b4b">
          <i class="fas fa-bullhorn" style="color:var(--nc-main);margin-right:8px"></i>공지사항
        </h2>
        <span id="unreadBadge" style="display:none;font-size:.8rem;background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:99px;font-weight:700"></span>
      </div>
      <div class="nc-filter-tabs">
        <button class="nc-tab active" data-cat="">전체</button>
        <button class="nc-tab" data-cat="시험공지">📝 시험</button>
        <button class="nc-tab" data-cat="행사공지">🎉 행사</button>
        <button class="nc-tab" data-cat="학부모공지">👨‍👩‍👧 학부모</button>
      </div>
      <div class="nc-list" id="noticeList"></div>
      <div class="nc-empty" id="noticeEmpty" style="display:none">
        <i class="fas fa-bell-slash"></i><p>공지사항이 없습니다.</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')"><i class="fas fa-times"></i></button>
      <div class="detail-badges" id="detailBadges"></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </div>

  <script>
  const TABLE_NOTICES = 'notices';
  const PARENT_ID = sessionStorage.getItem('userId') || 'parent';
  let allNotices = [], readSet = new Set(), currentFilter = '';

  document.addEventListener('DOMContentLoaded', async () => {
    const name = sessionStorage.getItem('userName') || '학부모';
    const child = sessionStorage.getItem('childName') || '자녀';
    document.getElementById('sidebarParentName').textContent = name;
    document.getElementById('sidebarChildName').textContent  = `자녀: ${child}`;
    document.getElementById('topbarName').textContent = name;
    document.getElementById('sidebarAvatar').textContent = name[0] || '부';
    document.getElementById('topbarAvatar').textContent  = name[0] || '부';

    // 사이드바 토글 (표준)
    (function() {
      const sb  = document.getElementById('sidebar');
      const dim = document.getElementById('sidebarDim');
      if (!sb || !dim) return;
      const open  = () => { sb.classList.add('open');    dim.classList.add('show');    document.body.style.overflow='hidden'; };
      const close = () => { sb.classList.remove('open'); dim.classList.remove('show'); document.body.style.overflow=''; };
      ['menuToggle','menuBtn'].forEach(id => document.getElementById(id)?.addEventListener('click', e => { e.stopPropagation(); sb.classList.contains('open') ? close() : open(); }));
      document.querySelectorAll('#sidebarClose, .sidebar-close').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); close(); }));
      dim.addEventListener('click', close);
    })();
    document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); sessionStorage.clear(); location.href = '../login.html'; });

    document.querySelectorAll('.nc-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nc-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active'); currentFilter = tab.dataset.cat; renderNotices();
      });
    });

    const saved = localStorage.getItem(`dvl_read_notices_${PARENT_ID}`);
    if (saved) readSet = new Set(JSON.parse(saved));
    await loadNotices();
  });

  async function loadNotices() {
    try {
      const res = await fetch(`../tables/${TABLE_NOTICES}?limit=200`);
      const data = await res.json();
      allNotices = (data.data || [])
        .filter(n => n.status === '발행' && (n.target === '전체' || n.target === '학부모'))
        .sort((a, b) => { if (a.is_pinned && !b.is_pinned) return -1; if (!a.is_pinned && b.is_pinned) return 1; return b.created_at - a.created_at; });
      const unread = allNotices.filter(n => !readSet.has(n.id)).length;
      const badge = document.getElementById('unreadBadge');
      if (unread > 0) { badge.style.display = 'inline'; badge.textContent = `새 공지 ${unread}개`; } else badge.style.display = 'none';
      renderNotices();
    } catch(e) {}
  }

  function renderNotices() {
    const list = document.getElementById('noticeList');
    const empty = document.getElementById('noticeEmpty');
    const filtered = currentFilter ? allNotices.filter(n => n.category === currentFilter) : allNotices;
    if (filtered.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const catClass = { '시험공지':'cat-exam','행사공지':'cat-event','학부모공지':'cat-parent' };
    list.innerHTML = filtered.map(n => {
      const cc = catClass[n.category] || 'cat-general';
      const unread = !readSet.has(n.id);
      const dateStr = n.created_at ? new Date(n.created_at).toLocaleDateString('ko-KR') : '';
      const preview = (n.content || '').replace(/\n/g,' ').substring(0, 60);
      return `<div class="nc-card ${n.is_pinned?'pinned':''} ${n.is_important?'important':''} ${unread?'unread':''}" onclick="openDetail('${n.id}')">
        <div class="nc-badges">
          <span class="nc-badge ${cc}">${n.category}</span>
          ${n.is_pinned?'<span class="nc-badge pin-tag">📌 고정</span>':''}
          ${n.is_important?'<span class="nc-badge imp-tag">🔴 중요</span>':''}
          ${unread?'<span class="nc-badge new-tag">NEW</span>':''}
        </div>
        <div class="nc-title">${unread?'🔵 ':''}${n.title}</div>
        <div class="nc-meta"><span><i class="fas fa-user"></i> ${n.author_name}</span><span><i class="fas fa-clock"></i> ${dateStr}</span></div>
        <div class="nc-preview">${preview}${(n.content||'').length>60?'…':''}</div>
      </div>`;
    }).join('');
  }

  function openDetail(id) {
    const n = allNotices.find(x => x.id === id); if (!n) return;
    readSet.add(id);
    localStorage.setItem(`dvl_read_notices_${PARENT_ID}`, JSON.stringify([...readSet]));
    renderNotices();
    const catClass = { '시험공지':'cat-exam','행사공지':'cat-event','학부모공지':'cat-parent' };
    const cc = catClass[n.category] || 'cat-general';
    document.getElementById('detailBadges').innerHTML = `<span class="nc-badge ${cc}">${n.category}</span>${n.is_important?'<span class="nc-badge imp-tag">🔴 중요</span>':''}`;
    document.getElementById('detailTitle').textContent = n.title;
    document.getElementById('detailMeta').innerHTML = `<span><i class="fas fa-user"></i> ${n.author_name}</span><span><i class="fas fa-clock"></i> ${n.created_at?new Date(n.created_at).toLocaleDateString('ko-KR'):''}</span>`;
    document.getElementById('detailContent').textContent = n.content || '';
    document.getElementById('detailModal').classList.add('open');
  }
  </script>

  <!-- 모바일 하단 네비게이션 -->
  <nav class="mobile-nav mobile-nav--parent" id="mobileNav">
    <div class="mobile-nav-inner">
      <a href="dashboard.html" class="mobile-nav-item"><i class="fas fa-home"></i><span>홈</span></a>
      <a href="grades.html" class="mobile-nav-item"><i class="fas fa-chart-line"></i><span>성적</span></a>
      <a href="learning.html" class="mobile-nav-item"><i class="fas fa-book-open"></i><span>학습</span></a>
      <a href="attendance.html" class="mobile-nav-item"><i class="fas fa-calendar-check"></i><span>출결</span></a>
      <a href="notice.html" class="mobile-nav-item active"><i class="fas fa-bullhorn"></i><span>공지</span></a>
    </div>
  </nav>
</body>
</html>
