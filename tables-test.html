<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Tables 경로 테스트</title></head>
<body style="font-family:monospace;background:#0f172a;color:#e2e8f0;padding:30px;">
<h2>🔍 API 경로 테스트</h2>
<pre id="log">테스트 중...</pre>
<script>
const log = document.getElementById('log');
function add(msg, color) {
  log.innerHTML += `<span style="color:${color||'#e2e8f0'}">${msg}\n</span>`;
}

add('현재 URL: ' + location.href, '#60a5fa');
add('현재 Origin: ' + location.origin, '#60a5fa');
add('');

async function test(label, url) {
  add(`[${label}] 요청: ${url}`, '#94a3b8');
  try {
    const r = await fetch(url);
    add(`[${label}] 응답: HTTP ${r.status}`, r.ok ? '#4ade80' : '#f87171');
    if (r.ok) {
      const d = await r.json();
      add(`[${label}] 데이터: ${JSON.stringify(d).substring(0,100)}`, '#4ade80');
    } else {
      const t = await r.text();
      add(`[${label}] 오류내용: ${t.substring(0,200)}`, '#f87171');
    }
  } catch(e) {
    add(`[${label}] 네트워크오류: ${e.message}`, '#f87171');
  }
  add('');
}

(async () => {
  // 1. 상대경로 tables/
  await test('상대경로 tables/', 'tables/student_profiles?limit=1');
  
  // 2. 절대경로 /tables/
  await test('절대경로 /tables/', '/tables/student_profiles?limit=1');
  
  // 3. 현재 origin + /tables/
  await test('origin+/tables/', location.origin + '/tables/student_profiles?limit=1');
  
  // 4. Genspark 직접
  await test('Genspark 직접', 'https://www.genspark.ai/api/code_sandbox_light/preview/8913df2f-c861-4c8f-b106-521a96c99c0e/tables/student_profiles?limit=1');
})();
</script>
</body>
</html>
